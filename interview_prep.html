<!DOCTYPE html>
<html lang="en">
<head>

    <style>
        /* Note: Google Sans is a proprietary font and not available via public CDN.
           Using a system font stack that prioritizes system fonts (often similar to Google Sans)
           and provides robust fallbacks. */
        body {
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "Noto Sans", sans-serif, "Apple Color Emoji", "Segoe UI Emoji", "Segoe UI Symbol", "Noto Color Emoji";
            background-color: #f9f9f9; /* Off-white background */
            color: #1a1a1a; /* Near black text */
        }
        .container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 1.5rem;
        }
        .card {
            background-color: #ffffff; /* White */
            border-radius: 0.75rem; /* rounded-xl */
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06); /* Black shadow */
            padding: 1.5rem;
            transition: transform 0.2s ease-in-out;
        }
        .card:hover {
            transform: translateY(-5px);
        }
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 0.75rem 1.5rem;
            border-radius: 0.5rem; /* rounded-lg */
            font-weight: 600; /* font-semibold */
            transition: background-color 0.2s ease-in-out, transform 0.1s ease-in-out;
            cursor: pointer;
            text-decoration: none;
        }
        .btn-primary {
            background-color: #333333; /* Dark Gray */
            color: #ffffff; /* White */
        }
        .btn-primary:hover {
            background-color: #1a1a1a; /* Black */
            transform: translateY(-1px);
        }
        .btn-secondary {
            background-color: #e5e5e5; /* Light Gray */
            color: #1a1a1a; /* Near black */
        }
        .btn-secondary:hover {
            background-color: #cccccc; /* Medium Gray */
            transform: translateY(-1px);
        }
        .accordion-header {
            background-color: #f0f0f0; /* Lightest Gray */
            border-radius: 0.5rem;
            padding: 1rem 1.25rem;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-weight: 600;
            color: #1a1a1a; /* Near black */
            border: 1px solid #d4d4d4; /* Gray border */
            margin-bottom: 0.5rem;
            transition: background-color 0.2s ease-in-out;
        }
        .accordion-header:hover {
            background-color: #e5e5e5; /* Light Gray */
        }
        .accordion-content {
            background-color: #ffffff; /* White */
            padding: 1rem 1.25rem;
            border-radius: 0.5rem;
            border: 1px solid #d4d4d4; /* Gray border */
            border-top: none;
            margin-top: -0.5rem; /* Overlap with header border */
            overflow: hidden;
            max-height: 0;
            transition: max-height 0.3s ease-out;
        }
        .accordion-item.active .accordion-content {
            max-height: 500px; /* Adjust as needed for content height */
            transition: max-height 0.5s ease-in;
        }
        .accordion-header svg {
            transition: transform 0.3s ease-in-out;
            color: #333333; /* Dark Gray for arrow */
        }
        .accordion-item.active .accordion-header svg {
            transform: rotate(180deg);
        }
        h1, h2, h3 {
            color: #1a1a1a; /* Near black for headings */
        }
        .text-gray-800 { color: #1a1a1a; } /* General text for headings */
        .text-gray-600 { color: #4a4a4a; } /* Slightly lighter gray for subheadings/descriptions */
        .text-gray-700 { color: #333333; } /* For accordion content text */
        .text-gray-400 { color: #888888; } /* Lighter gray for footer copyright */
        .text-gray-500 { color: #666666; } /* For 'View Questions' link */
    </style>

            technical: {
                python: [
                    { question: "Explain the difference between mutable and immutable data types in Python. Provide examples.", answer: "Mutable objects can be changed after they are created (e.g., lists, dictionaries, sets). Immutable objects cannot be changed after creation (e.g., numbers, strings, tuples)." },
                    { question: "What is a decorator in Python? Can you give a simple example of when you might use one?", answer: "A decorator is a design pattern that allows you to modify the functionality of a function or class without changing its source code. It's often used for logging, authentication, rate limiting, etc. Example: `@my_decorator\ndef my_function(): pass`" },
                    { question: "How do you handle exceptions in Python? Describe the `try`, `except`, `else`, and `finally` blocks.", answer: "`try` block tests code for exceptions. `except` block catches and handles exceptions. `else` block executes if no exceptions occur in `try`. `finally` block always executes, regardless of exceptions." },
                    { question: "Explain the Global Interpreter Lock (GIL) in Python. How does it affect multithreading?", answer: "The GIL is a mutex that protects access to Python objects, preventing multiple native threads from executing Python bytecodes at once. This means even on multi-core processors, only one thread can execute Python bytecode at a time, limiting true parallel execution for CPU-bound tasks." },
                    { question: "What are `*args` and `**kwargs` used for in Python function definitions?", answer: "`*args` allows a function to accept an arbitrary number of positional arguments as a tuple. `**kwargs` allows a function to accept an arbitrary number of keyword arguments as a dictionary." },
                    { question: "Differentiate between `list`, `tuple`, `set`, and `dictionary` in Python. When would you use each?", answer: "`list`: ordered, mutable, allows duplicates (general purpose sequence). `tuple`: ordered, immutable, allows duplicates (fixed collections, dictionary keys). `set`: unordered, mutable, no duplicates (membership testing, unique items). `dictionary`: unordered (Python 3.7+ insertion-ordered), mutable, key-value pairs (mapping data)." },
                    { question: "How does Python's garbage collection work?", answer: "Python uses reference counting and a cyclic garbage collector. Reference counting tracks references to objects; when count drops to zero, object is deallocated. Cyclic garbage collector handles reference cycles (objects referencing each other but no external references)." },
                    { question: "Explain the purpose of `__init__` and `self` when defining a class in Python.", answer: "`__init__` is the constructor method, called when an object is created. `self` is a reference to the instance of the class itself, used to access instance variables and methods." },
                    { question: "What is a generator in Python, and what are its benefits?", answer: "A generator is a function that returns an iterator. It uses `yield` instead of `return`. Benefits include memory efficiency (generates values on-the-fly, not all at once), lazy evaluation, and infinite sequences." },
                    { question: "Imagine you need to process a large text file to count word frequencies. How would you approach this in Python, considering memory efficiency?", answer: "Use a generator to read the file line by line (or in chunks) to avoid loading the entire file into memory. Process each line, split into words, and update a dictionary (e.g., `collections.Counter`) for frequencies. This keeps memory usage minimal." },
                    { question: "What is a virtual environment in Python and why is it used?", answer: "A virtual environment is an isolated Python environment that allows you to manage dependencies for different projects separately. This prevents conflicts between project dependencies." },
                    { question: "Explain the concept of 'scope' in Python.", answer: "Scope refers to the region of a program where a variable is accessible. Python follows LEGB rule: Local, Enclosing function locals, Global, Built-in." },
                    { question: "How do you perform file I/O operations in Python?", answer: "Using the `open()` function with different modes ('r' for read, 'w' for write, 'a' for append, 'x' for create, 'b' for binary, 't' for text) and then using methods like `read()`, `write()`, `readline()`, `readlines()`." },
                    { question: "What is the difference between `==` and `is` in Python?", answer: "`==` checks for value equality (do two objects have the same value). `is` checks for identity equality (do two variables refer to the exact same object in memory)." },
                    { question: "How can you make a Python script executable on a Linux system?", answer: "Add a shebang line (`#!/usr/bin/env python3`) at the top of the script and then use `chmod +x script_name.py` to give it execute permissions." },
                    { question: "Explain the concept of a closure in Python.", answer: "A closure is a nested function that remembers and has access to variables from its enclosing scope, even after the enclosing function has finished execution. It 'closes over' the free variables." },
                    { question: "What is the purpose of `__str__` and `__repr__` methods in Python classes?", answer: "`__str__` provides a human-readable string representation of an object (for end-users, e.g., `print()`). `__repr__` provides an unambiguous, developer-focused representation that could recreate the object (for debugging/development, e.g., `repr()`)." },
                    { question: "How does Python handle memory management?", answer: "Python uses a private heap to manage memory. All Python objects and data structures are located in a private heap. The programmer does not have direct access to this private heap. The Python interpreter takes care of managing this private heap." },
                    { question: "Describe the concept of 'duck typing' in Python.", answer: "Duck typing is a concept where the type or the class of an object is less important than the methods it defines. If it walks like a duck and quacks like a duck, then it must be a duck. Python focuses on 'what an object can do' rather than 'what an object is'." },
                    { question: "What is the difference between `range()` and `xrange()` (Python 2) or `range()` in Python 3?", answer: "In Python 2, `range()` returns a list, consuming memory for large ranges. `xrange()` returns a generator, iterating on demand. In Python 3, `range()` behaves like Python 2's `xrange()`, returning an iterable object, making it memory efficient." },
                    { question: "Explain the concept of 'list comprehensions' in Python. Provide an example.", answer: "List comprehensions provide a concise way to create lists. It consists of brackets containing an expression followed by a `for` clause, then zero or more `for` or `if` clauses. Example: `squares = [x**2 for x in range(10)]`." },
                    { question: "What is a 'lambda function' in Python?", answer: "A lambda function is a small, anonymous function defined with the `lambda` keyword. It can take any number of arguments but can only have one expression. They are often used for short, throwaway functions." },
                    { question: "How do you implement polymorphism in Python?", answer: "Polymorphism in Python is achieved through method overriding and duck typing. Objects can respond differently to the same method call based on their type or the methods they implement." },
                    { question: "What is the purpose of `pip` in Python?", answer: "`pip` is the package installer for Python. It allows you to install and manage additional libraries and dependencies that are not part of the Python standard library." },
                    { question: "Describe how you would debug a Python script.", answer: "Debugging can involve using `print()` statements, using a debugger like `pdb` (Python Debugger) for step-by-step execution, setting breakpoints, inspecting variables, or using IDE-integrated debuggers." },
                    { question: "What is the difference between shallow copy and deep copy in Python?", answer: "Shallow copy creates a new object but inserts references to the original object's elements. Deep copy creates a new object and recursively copies all objects found in the original, creating independent copies." },
                    { question: "Explain the concept of 'iterators' and 'iterables' in Python.", answer: "An iterable is an object that can be iterated over (e.g., list, tuple, string). An iterator is an object with a `__next__` method that returns the next item in the sequence. `iter()` creates an iterator from an iterable." },
                    { question: "How do you work with JSON data in Python?", answer: "The `json` module is used. `json.dumps()` converts a Python dictionary to a JSON string. `json.loads()` converts a JSON string to a Python dictionary." },
                    { question: "What is the `pass` statement in Python?", answer: "The `pass` statement is a null operation; nothing happens when it executes. It's used as a placeholder where a statement is syntactically required but you don't want any code to execute (e.g., empty function body, empty loop)." },
                    { question: "Explain the concept of 'modules' and 'packages' in Python.", answer: "A module is a single Python file (`.py`) containing code. A package is a collection of modules organized in directories, providing a way to structure larger applications and prevent naming conflicts. Packages contain an `__init__.py` file." },
                    { question: "What is a 'docstring' in Python, and what is its purpose?", answer: "A docstring is a string literal that occurs as the first statement in a module, function, class, or method definition. It's used to document the purpose and usage of the code, accessible via `__doc__` or `help()`." },
                    { question: "How do you handle file permissions in Python?", answer: "You can use the `os` module for file permissions. `os.chmod()` changes file permissions, `os.access()` checks permissions, and `os.stat()` gets file status including permissions." },
                    { question: "What is the `collections` module in Python?", answer: "The `collections` module implements specialized container datatypes providing alternatives to Python's general purpose built-in containers, such as `dict`, `list`, `set`, and `tuple`. Examples: `Counter`, `deque`, `defaultdict`, `namedtuple`." },
                    { question: "Explain 'descriptors' in Python.", answer: "Descriptors are objects that implement a protocol (methods like `__get__`, `__set__`, `__delete__`). They allow objects to customize attribute access (getting, setting, deleting) on other objects. Used in properties, methods, `classmethod`, `staticmethod`." },
                    { question: "What is the difference between `isinstance()` and `type()` in Python?", answer: "`isinstance(obj, classinfo)` checks if an object is an instance of a class or a subclass thereof (returns `True` for inheritance). `type(obj)` returns the exact type of an object. `isinstance()` is generally preferred for type checking due to polymorphism." },
                    { question: "How does Python handle 'multiple inheritance'?", answer: "Python supports multiple inheritance, allowing a class to inherit from multiple parent classes. It uses a Method Resolution Order (MRO) algorithm (C3 linearization) to determine the order in which methods are searched in the inheritance hierarchy." },
                    { question: "What is a 'context manager' in Python, and how is it used?", answer: "A context manager is an object that defines the runtime context for a statement. It's used with the `with` statement to ensure that resources are properly acquired and released, even if errors occur (e.g., file handling, locks). Implements `__enter__` and `__exit__`." },
                    { question: "Explain the concept of 'Metaclasses' in Python.", answer: "A metaclass is the class of a class. It defines how a class behaves. When you create a class, Python uses a metaclass (by default `type`) to construct it. Metaclasses allow you to customize class creation." },
                    { question: "What is the purpose of `setuptools` or `distutils`?", answer: "`setuptools` (and its predecessor `distutils`) are Python libraries used for packaging Python projects. They allow you to define how your project is built, distributed, and installed, making it easy for others to use your code." },
                    { question: "How do you perform unit testing in Python?", answer: "Python has built-in modules like `unittest` and external frameworks like `pytest`. You write test cases as functions or methods that assert expected outcomes for specific units of code." },
                    { question: "Explain the concept of 'generators' vs. 'iterators' in more detail.", answer: "All generators are iterators, but not all iterators are generators. An iterator is an object that implements the iterator protocol (`__iter__` and `__next__`). A generator is a special type of iterator created by a function that uses the `yield` keyword." },
                    { question: "What is `asyncio` in Python?", answer: "`asyncio` is a Python library for writing concurrent code using the `async/await` syntax. It's used for building high-performance network and web servers, database connections, and other I/O-bound concurrent applications using coroutines." },
                    { question: "Describe the 'Decorator Pattern' in Python.", answer: "The Decorator Pattern allows behavior to be added to an individual object, dynamically, without affecting the behavior of other objects from the same class. In Python, this is often implemented using functions that take a function as an argument and return a new function." },
                    { question: "What is the difference between `__slots__` and `__dict__`?", answer: "`__dict__` is a dictionary used to store an object's attributes. `__slots__` is a class attribute that allows you to explicitly declare instance variables, which can save memory and speed up attribute access by preventing the creation of `__dict__` for each instance." },
                    { question: "How do you integrate Python with C/C++ code?", answer: "Python can integrate with C/C++ using various methods: `ctypes` (for calling C functions directly), `SWIG` (Simplified Wrapper and Interface Generator), `Cython` (writing C extensions in Python-like syntax), or `Pybind11` (for C++ interoperability)." }
                ],
                java: [
                    { question: "Explain the four core principles of Object-Oriented Programming (OOP): Encapsulation, Inheritance, Polymorphism, and Abstraction.", answer: "Encapsulation: Bundling data and methods that operate on the data within a single unit (class). Inheritance: A class deriving properties and behavior from another class. Polymorphism: Objects of different classes can be treated as objects of a common type. Abstraction: Hiding complex implementation details and showing only essential features." },
                    { question: "Differentiate between `ArrayList` and `LinkedList` in Java. When would you choose one over the other?", answer: "`ArrayList` uses a dynamic array; good for random access (get) due to index-based access, but slow for insertions/deletions in the middle. `LinkedList` uses a doubly linked list; good for frequent insertions/deletions, but slower for random access." },
                    { question: "What is the difference between method overloading and method overriding in Java?", answer: "Overloading: Multiple methods in the same class with the same name but different parameters. Overriding: Subclass provides a specific implementation for a method already defined in its superclass (same name, same parameters)." },
                    { question: "Explain the purpose and usage of the `static` keyword in Java.", answer: "`static` makes a member (variable or method) belong to the class itself, rather than to any specific instance of the class. Static members can be accessed directly using the class name." },
                    { question: "What is the purpose of the `finally` block in a `try-catch` statement? When is it executed?", answer: "The `finally` block contains code that is always executed after the `try` block and any `catch` blocks, regardless of whether an exception was thrown or caught. It's used for cleanup operations." },
                    { question: "How do you handle exceptions in Java? Describe checked vs. unchecked exceptions.", answer: "Exceptions are handled using `try-catch` blocks. Checked exceptions (e.g., `IOException`) must be declared or caught. Unchecked exceptions (e.g., `RuntimeException`) do not need to be declared or caught." },
                    { question: "What is the difference between an `interface` and an `abstract class` in Java?", answer: "`Interface`: Defines a contract, all methods are implicitly public abstract (Java 8+ allows default/static methods). `Abstract Class`: Can have abstract and non-abstract methods, can have constructors, and can define instance variables. A class can implement multiple interfaces but extend only one abstract class." },
                    { question: "Explain the concept of multithreading in Java. How can you create and run a new thread?", answer: "Multithreading allows concurrent execution of two or more parts of a program. You can create a thread by extending the `Thread` class or implementing the `Runnable` interface. Call the `start()` method on the `Thread` object to run it." },
                    { question: "What is the Java Virtual Machine (JVM), and what is its role in running Java applications?", answer: "The JVM is an abstract machine that provides a runtime environment in which Java bytecode can be executed. It acts as an interpreter and runtime engine, making Java platform-independent ('Write Once, Run Anywhere')." },
                    { question: "How would you conceptually connect a Java application to a MongoDB database?", answer: "You would use a MongoDB Java driver (e.g., MongoDB Java Driver or Spring Data MongoDB if using Spring Framework). This driver provides APIs to establish a connection, perform CRUD operations, and map Java objects to BSON documents." },
                    { question: "What is a constructor in Java? What is its purpose?", answer: "A constructor is a special method used to initialize objects. It has the same name as the class and no return type. Its purpose is to set initial values for object attributes." },
                    { question: "Explain the concept of 'pass by value' and 'pass by reference' in Java.", answer: "Java is strictly 'pass by value'. When primitive types are passed, a copy of the value is made. When objects are passed, a copy of the reference (memory address) is made, meaning both the original and the method's parameter point to the same object." },
                    { question: "What is the `super` keyword used for in Java?", answer: "`super` is used to refer to the immediate parent class object. It can be used to call parent class methods, access parent class fields, and invoke parent class constructors." },
                    { question: "What is the purpose of the `this` keyword in Java?", answer: "`this` refers to the current instance of the class. It's used to distinguish between instance variables and parameters with the same name, or to call other constructors within the same class." },
                    { question: "Describe the concept of 'packaging' in Java.", answer: "Packages are used to organize classes and interfaces into logical groups. They help in avoiding naming conflicts and provide a way to control access to classes and interfaces (access modifiers like `public`, `private`, `protected`, default)." },
                    { question: "Explain the concept of 'Garbage Collection' in Java.", answer: "Garbage Collection is an automatic memory management process that frees up memory by destroying unreachable objects. The JVM automatically identifies and removes objects that are no longer referenced by the program, preventing memory leaks." },
                    { question: "What are Java Generics, and why are they used?", answer: "Generics allow you to write classes, interfaces, and methods that operate on types as parameters. They are used to provide type safety at compile-time and eliminate the need for type casting, reducing runtime errors." },
                    { question: "Differentiate between `==` operator and `.equals()` method in Java.", answer: "`==` compares object references (memory addresses) for primitive types, it compares values. `.equals()` method (from `Object` class, often overridden) compares the actual content or values of objects." },
                    { question: "What is the purpose of the `hashCode()` and `equals()` contract?", answer: "If two objects are equal according to the `equals()` method, then their `hashCode()` methods must produce the same integer result. This contract is crucial for collections like `HashMap` and `HashSet` to function correctly." },
                    { question: "Explain the concept of 'Serialization' in Java.", answer: "Serialization is the process of converting an object into a byte stream to store the object or transmit it over a network. Deserialization is the reverse process, reconstructing the object from the byte stream." },
                    { question: "What is a 'Daemon Thread' in Java?", answer: "A Daemon Thread is a low-priority thread that runs in the background to provide services to user threads. The JVM exits when only daemon threads remain, as they are not essential for the program's execution." },
                    { question: "Describe the 'Collection Framework' in Java.", answer: "The Java Collections Framework is a set of interfaces and classes that represent groups of objects as a single unit. It provides standard architectures for storing and manipulating groups of objects (e.g., `List`, `Set`, `Map`, `Queue`)." },
                    { question: "What is the purpose of the `volatile` keyword in Java?", answer: "The `volatile` keyword ensures that a variable's value is always read from main memory and written to main memory, preventing threads from caching the variable's value locally. It ensures visibility of changes across threads." },
                    { question: "Explain the concept of 'Immutable Objects' in Java. Why are they useful?", answer: "Immutable objects are objects whose state cannot be modified after they are created. Benefits include thread safety (no synchronization needed), easier caching, and improved security. Example: `String`." },
                    { question: "What is JDBC (Java Database Connectivity)?", answer: "JDBC is a Java API that defines how a Java client can connect to a database. It provides methods for querying and updating data in a database, acting as a bridge between Java applications and databases." },
                    { question: "Differentiate between `throw` and `throws` keywords in Java.", answer: "`throw` is used to explicitly throw an exception from a method or block of code. `throws` is used in a method signature to declare that a method might throw one or more specified checked exceptions." },
                    { question: "What is the purpose of the `enum` keyword in Java?", answer: "The `enum` keyword is used to declare an enumerated type, which is a special data type that enables a variable to be a set of predefined constants. It provides type safety and is more robust than using integer constants." },
                    { question: "Explain the concept of 'Autoboxing' and 'Unboxing' in Java.", answer: "Autoboxing is the automatic conversion that the Java compiler makes between the primitive types and their corresponding object wrapper classes (e.g., `int` to `Integer`). Unboxing is the reverse process, converting a wrapper class object back to its primitive type." },
                    { question: "Describe the 'Singleton Design Pattern' in Java.", answer: "The Singleton pattern ensures that a class has only one instance and provides a global point of access to that instance. It's often used for logging, configuration management, or database connection pools." },
                    { question: "What is the 'JVM ClassLoader'?", answer: "The JVM ClassLoader is a subsystem of the JVM that is used to load class files into Java's runtime environment. It performs three main functions: Loading, Linking (Verification, Preparation, Resolution), and Initialization." },
                    { question: "Explain the difference between `final`, `finally`, and `finalize` in Java.", answer: "`final` (keyword): Used for variables (constant), methods (cannot be overridden), classes (cannot be subclassed). `finally` (block): Always executes after `try`/`catch` blocks, used for cleanup. `finalize` (method): Called by Garbage Collector before an object is destroyed (deprecated in modern Java)." },
                    { question: "What is the 'Stream API' in Java 8?", answer: "The Stream API provides a new way to process collections of objects. It allows for functional-style operations on streams of elements, enabling declarative and concise code for tasks like filtering, mapping, and reducing data." },
                    { question: "Differentiate between `HashMap` and `ConcurrentHashMap`.", answer: "`HashMap` is not thread-safe and can lead to infinite loops or data corruption in concurrent environments. `ConcurrentHashMap` is thread-safe, providing better performance than `Collections.synchronizedMap()` for concurrent access." },
                    { question: "Explain the concept of 'Reflection' in Java.", answer: "Reflection is the ability of a program to examine or modify its own structure and behavior at runtime. It allows you to inspect classes, interfaces, fields, and methods at runtime without knowing their names at compile time." },
                    { question: "What is the purpose of the `transient` keyword in Java?", answer: "The `transient` keyword is used to mark a field of an object to indicate that it should not be serialized when the object is written to a persistent storage. It's typically used for sensitive data or data that can be re-derived." },
                    { question: "Describe the 'Factory Design Pattern' in Java.", answer: "The Factory Method pattern provides an interface for creating objects in a superclass, but allows subclasses to alter the type of objects that will be created. It defers object instantiation to subclasses, promoting loose coupling." },
                    { question: "What are 'Annotations' in Java?", answer: "Annotations are metadata that can be added to Java source code. They provide information about the code that can be used by the compiler, JVM, or other tools. Examples: `@Override`, `@Deprecated`, custom annotations for frameworks." },
                    { question: "Explain the concept of 'Method References' in Java 8.", answer: "Method references are compact, easy-to-read equivalents of lambda expressions that refer to methods by name. They are used to refer to a method without executing it, often for functional interfaces." },
                    { question: "What is the 'Optional' class in Java 8?", answer: "The `Optional` class is a container object that may or may not contain a non-null value. It's used to avoid `NullPointerException` and to provide a clear way to indicate that a method might return no result." }
                ],
                mongodb: [
                    { question: "What is MongoDB, and what makes it a NoSQL database?", answer: "MongoDB is a document-oriented NoSQL database. It stores data in flexible, JSON-like documents, unlike traditional relational databases that use tables. It's schema-less, scalable, and offers high performance." },
                    { question: "Explain the core concepts of a 'document' and a 'collection' in MongoDB.", answer: "A 'document' is a record in MongoDB, similar to a row in a relational database, but with a flexible schema (JSON/BSON format). A 'collection' is a group of MongoDB documents, analogous to a table in a relational database." },
                    { question: "How do you perform basic CRUD (Create, Read, Update, Delete) operations in MongoDB? Provide examples of commands.", answer: "Create: `db.collection.insertOne()`, `db.collection.insertMany()`. Read: `db.collection.find()`, `db.collection.findOne()`. Update: `db.collection.updateOne()`, `db.collection.updateMany()`. Delete: `db.collection.deleteOne()`, `db.collection.deleteMany()`." },
                    { question: "What are indexes in MongoDB, and why are they important for query performance?", answer: "Indexes are special data structures that store a small portion of the collection's data in an easy-to-traverse form. They improve query performance by allowing MongoDB to quickly locate documents without scanning the entire collection." },
                    { question: "Explain the difference between embedding documents and using references in MongoDB. When would you choose one over the other?", answer: "Embedding: Stores related data within a single document (denormalized). Good for one-to-one or one-to-few relationships, fast reads. Referencing: Stores relationships by linking documents via IDs (normalized). Good for complex many-to-many relationships, large nested arrays, or frequently changing related data." },
                    { question: "How does sharding work in MongoDB, and what problem does it solve?", answer: "Sharding is a method for distributing data across multiple machines (shards) to handle large datasets and high throughput. It solves the problem of scaling horizontally when a single server can no longer handle the load or storage requirements." },
                    { question: "What is replication in MongoDB, and what are its benefits?", answer: "Replication involves maintaining multiple copies of data across several servers (replica set). Benefits include high availability (automatic failover), data redundancy, and improved read scalability (reads can be distributed across members)." },
                    { question: "Describe the `find()` method and some common query operators you've used (e.g., `$eq`, `$gt`, `$in`).", answer: "`find()` is used to query documents in a collection. `$eq` (equal to), `$gt` (greater than), `$lt` (less than), `$gte` (greater than or equal), `$lte` (less than or equal), `$ne` (not equal to), `$in` (value is in an array), `$and`, `$or`." },
                    { question: "When would you choose MongoDB over a relational database like MySQL or PostgreSQL?", answer: "Choose MongoDB for: flexible schema (rapid iteration), large volumes of unstructured/semi-structured data, high scalability requirements (horizontal scaling), real-time analytics, and cloud-native applications. Choose relational for: strict schema, complex transactions (ACID), strong data integrity needs, and complex joins." },
                    { question: "How would you ensure data consistency in a distributed MongoDB environment?", answer: "MongoDB offers various read and write concerns. Write concerns ensure a certain level of acknowledgment from replica set members before a write operation is considered successful. Read concerns allow clients to choose the consistency level for their reads (e.g., `majority`, `linearizable`)." },
                    { question: "What is MongoDB Atlas?", answer: "MongoDB Atlas is a fully managed cloud database service for MongoDB. It handles database administration tasks like provisioning, patching, backups, and scaling, allowing developers to focus on application development." },
                    { question: "Explain the concept of an 'aggregation pipeline' in MongoDB.", answer: "An aggregation pipeline processes data records and returns computed results. It consists of stages (e.g., `$match`, `$group`, `$project`, `$sort`) that documents pass through, transforming them sequentially to produce the desired output." },
                    { question: "What is the default port for MongoDB?", answer: "The default port for MongoDB is 27017." },
                    { question: "How do you back up and restore a MongoDB database?", answer: "Backup: Use `mongodump` to create a binary export of the database. Restore: Use `mongorestore` to import the data from the `mongodump` backup into a MongoDB instance." },
                    { question: "What is the `_id` field in MongoDB documents?", answer: "The `_id` field is a unique identifier for each document in a collection. If not provided, MongoDB automatically generates an `ObjectId` for it. It's indexed by default." },
                    { question: "Describe the purpose of the MongoDB Shell (mongosh).", answer: "The MongoDB Shell (mongosh) is a command-line interface for interacting with MongoDB. It allows you to query, update, and manage your MongoDB databases and collections directly." },
                    { question: "What are 'GridFS' in MongoDB, and when would you use it?", answer: "GridFS is a specification for storing and retrieving files that exceed the BSON-document size limit of 16 MB. Instead of storing a file in a single document, GridFS divides the file into chunks and stores each chunk as a separate document." },
                    { question: "How do you handle transactions in MongoDB (since version 4.0)?", answer: "MongoDB supports multi-document ACID transactions across replica sets and sharded clusters. You start a session, begin a transaction, perform operations, and then commit or abort the transaction." },
                    { question: "Explain the concept of 'Write Concern' in MongoDB.", answer: "Write concern describes the level of acknowledgment requested from MongoDB for write operations. It specifies how many replica set members must confirm the write before the operation returns success (e.g., `w: 1` for primary, `w: majority` for most members)." },
                    { question: "What is the purpose of the MongoDB Compass?", answer: "MongoDB Compass is a GUI tool that allows you to visually explore your MongoDB data, run ad-hoc queries, interact with your data, and optimize performance without needing to use the MongoDB Shell." },
                    { question: "How does MongoDB ensure data integrity without a fixed schema?", answer: "While schema-less, MongoDB allows for schema validation rules to be applied at the collection level. This enables developers to enforce data structure and types, ensuring integrity while maintaining flexibility." },
                    { question: "What is the role of the 'oplog' in MongoDB replication?", answer: "The oplog (operation log) is a special capped collection that stores a rolling record of all operations that modify data in the database. It's used by secondary members of a replica set to apply operations in the same order as the primary, ensuring data consistency." },
                    { question: "Explain the concept of 'Read Preference' in MongoDB.", answer: "Read preference determines how clients direct read operations to the members of a replica set. Options include `primary` (default), `primaryPreferred`, `secondary`, `secondaryPreferred`, and `nearest`." },
                    { question: "How do you perform text search in MongoDB?", answer: "MongoDB supports text search using text indexes. You create a text index on a field (or multiple fields) and then use the `$text` operator in your `find()` queries." },
                    { question: "What is the purpose of the `db.collection.stats()` command?", answer: "`db.collection.stats()` returns a document that contains various statistics about the collection, such as its size, number of documents, storage size, and index sizes." },
                    { question: "Explain the concept of 'Change Streams' in MongoDB.", answer: "Change Streams allow applications to access real-time data changes in MongoDB collections, replica sets, and sharded clusters. They enable applications to react to data modifications instantly, useful for real-time analytics, microservices, and data synchronization." },
                    { question: "What is a 'Capped Collection' in MongoDB?", answer: "A capped collection is a fixed-size collection that automatically overwrites its oldest entries when it reaches its maximum size. They are high-performance collections that support high-throughput operations and insertion order." },
                    { question: "How does MongoDB handle 'concurrency control'?", answer: "MongoDB uses multi-granularity locking, allowing operations to lock at the database, collection, or document level. For the WiredTiger storage engine (default), it uses document-level concurrency control for most read/write operations." },
                    { question: "What is a 'Compound Index' in MongoDB?", answer: "A compound index is an index on multiple fields. It can support queries that match on all the index fields, a prefix of the index fields, or a range on the last field in the prefix." },
                    { question: "Differentiate between `_id` and custom primary keys in MongoDB.", answer: "Every MongoDB document has an `_id` field, which is a unique identifier. You can let MongoDB generate an `ObjectId` automatically, or you can provide your own unique value. Custom primary keys are simply user-defined fields that you ensure are unique and serve as logical identifiers within your application." },
                    { question: "What is 'Index Intersection'?", answer: "Index intersection is a query optimization technique where MongoDB can use multiple indexes to fulfill a query. Instead of scanning a single compound index, it can use separate indexes on different fields and then combine the results." },
                    { question: "Explain the concept of 'Schema Validation' in MongoDB.", answer: "Schema validation allows you to enforce document structure and data types at the collection level. You can define rules using JSON Schema to ensure that documents inserted or updated in a collection conform to a specific format." },
                    { question: "What is a 'Replica Set Arbiter'?", answer: "An arbiter is a member of a replica set that does not hold data but participates in the election process to determine the primary. Arbiters are used to break ties in elections when the replica set has an even number of data-bearing members." },
                    { question: "How do you perform 'Full-Text Search' in MongoDB?", answer: "Full-text search in MongoDB is enabled by creating a text index on a field or fields that contain string content. You then use the `$text` operator in `find()` queries to search for words or phrases within that indexed text content." },
                    { question: "What is the purpose of the `explain()` method in MongoDB?", answer: "The `explain()` method provides information about the query plan that MongoDB uses to execute a query. It helps in understanding query performance, identifying bottlenecks, and optimizing queries by showing index usage, scan details, and execution stages." }
                ],
                servicenow: [
                    { question: "What is ServiceNow, and what is its primary purpose in an enterprise environment?", answer: "ServiceNow is a cloud-based platform that provides IT Service Management (ITSM), IT Operations Management (ITOM), IT Business Management (ITBM), and other workflow automation solutions. Its primary purpose is to streamline and automate business processes, particularly in IT, across an organization." },
                    { question: "As a Certified System Administrator, what are your key responsibilities in managing a ServiceNow instance?", answer: "Key responsibilities include user and group management, role assignment, data imports, managing CMDB, configuring forms and lists, setting up notifications, troubleshooting basic issues, and ensuring system health and security." },
                    { question: "As a Certified Application Developer, what types of applications have you created or would you be able to create on the ServiceNow platform?", answer: "As a CAD, I can create custom applications to automate specific business processes beyond standard ITSM. For example, I could build apps for HR onboarding, facilities management, project tracking, or even a custom educational organization app, as I did in my internship." },
                    { question: "Explain the core IT Service Management (ITSM) concepts of Incident, Problem, and Change Management within ServiceNow.", answer: "Incident Management: Restoring normal service operations as quickly as possible. Problem Management: Identifying root causes of incidents to prevent recurrence. Change Management: Controlling the lifecycle of all changes to minimize disruption to IT services." },
                    { question: "What is a workflow in ServiceNow, and how does it automate processes?", answer: "A workflow in ServiceNow is a sequence of activities that automates a process. It defines the stages, approvals, tasks, and notifications involved, guiding records through their lifecycle based on defined conditions and actions." },
                    { question: "How do you manage user roles and access control within ServiceNow?", answer: "User roles are managed by assigning specific roles (e.g., 'itil', 'admin') to users or groups. Access control is enforced through Access Control Lists (ACLs), which define what data users can access and what operations they can perform (read, write, create, delete) on specific tables or fields." },
                    { question: "What is the CMDB (Configuration Management Database) in ServiceNow, and why is it important?", answer: "The CMDB is a database that stores information about all the Configuration Items (CIs) in an organization's IT environment (e.g., servers, applications, networks). It's crucial for understanding relationships between CIs, impact analysis, incident resolution, and change planning." },
                    { question: "Describe how you would customize a form or a list view in ServiceNow to meet specific user requirements.", answer: "To customize a form, I'd use the Form Designer to add/remove fields, create sections, and arrange layout. For a list view, I'd use the List Layout configuration to select columns, order them, and apply filters to display relevant data for users." },
                    { question: "What are Business Rules in ServiceNow, and when would you use them?", answer: "Business Rules are server-side scripts that run when a record is inserted, updated, deleted, or queried. They are used to implement custom logic, such as validating data, setting field values, sending notifications, or interacting with other records based on specific conditions." },
                    { question: "How does ServiceNow contribute to automating IT operations and improving service delivery?", answer: "ServiceNow automates IT operations by orchestrating tasks, approvals, and workflows across various IT processes (e.g., incident resolution, software provisioning). This reduces manual effort, speeds up service delivery, improves consistency, and enhances the overall user experience." },
                    { question: "What is a Service Catalog in ServiceNow?", answer: "The Service Catalog is a self-service portal where users can request IT services and products offered by the IT department. It provides a user-friendly interface to browse offerings, submit requests, and track their status." },
                    { question: "Explain the concept of 'dot-walking' in ServiceNow scripting.", answer: "Dot-walking is a feature in ServiceNow scripting that allows you to access fields and related records from a reference field. For example, `current.assigned_to.email` would retrieve the email of the assigned user." },
                    { question: "What is an Update Set in ServiceNow?", answer: "An Update Set is a group of customizations and configurations that can be moved from one ServiceNow instance to another (e.g., from development to test, then to production). It helps manage and deploy changes consistently." },
                    { question: "Describe the difference between a UI Policy and a Client Script in ServiceNow.", answer: "UI Policies are used to dynamically change the behavior of form fields (e.g., make visible, mandatory, read-only) without scripting. Client Scripts are JavaScript code that runs on the client-side (browser) to add more complex client-side logic and validations." },
                    { question: "What are Script Includes in ServiceNow, and why are they used?", answer: "Script Includes are reusable server-side JavaScript functions that can be called from various places in ServiceNow (e.g., Business Rules, workflows, UI Actions). They promote code reusability and maintainability." },
                    { question: "What is a 'Transform Map' in ServiceNow?", answer: "A Transform Map is a set of field maps that determine the relationships between fields in an import set table and fields in an existing ServiceNow table. It's used to define how imported data should be transformed and mapped to target tables." },
                    { question: "Explain the concept of 'GlideRecord' in ServiceNow scripting.", answer: "GlideRecord is a JavaScript object that allows you to interact with the ServiceNow database. It provides methods to query, insert, update, and delete records from tables." },
                    { question: "What is the difference between a 'Global' and a 'Scoped' application in ServiceNow?", answer: "Global applications run in the 'global' scope and can access all tables and scripts. Scoped applications run in their own private scope, providing better isolation, security, and preventing naming conflicts, which is the recommended practice for new development." },
                    { question: "How would you debug a Business Rule or a Script Include in ServiceNow?", answer: "Debugging can involve using `gs.log()` or `gs.info()` for logging messages, using the Script Debugger (if available), or using the 'System Logs' to check for errors and output." },
                    { question: "What is a 'Service Portal' in ServiceNow?", answer: "Service Portal is a framework for building engaging, mobile-friendly self-service experiences for users. It allows organizations to create custom portals for their employees or customers to request services, find information, and interact with IT." },
                    { question: "Explain the concept of 'Flow Designer' in ServiceNow.", answer: "Flow Designer is a no-code/low-code tool for automating business processes and workflows across ServiceNow applications and external systems. It allows users to build complex flows visually without writing code." },
                    { question: "What are 'UI Actions' in ServiceNow?", answer: "UI Actions are buttons, links, or context menu items that appear on forms or lists and allow users to perform specific tasks. They can execute client-side scripts, server-side scripts, or both." },
                    { question: "How do you ensure data security and privacy within ServiceNow?", answer: "Data security is ensured through ACLs (Access Control Lists), user roles, encryption (at rest and in transit), platform hardening, and adherence to compliance standards. Data privacy involves controlling who can see what information based on roles and data classification." },
                    { question: "What is the purpose of 'Notifications' in ServiceNow?", answer: "Notifications are used to inform users about events and changes in the system. They can be triggered by business rules, workflows, or events, and delivered via email, SMS, or push notifications." },
                    { question: "Describe how you would integrate ServiceNow with an external system.", answer: "Integration can be done using various methods like REST APIs (inbound/outbound), SOAP web services, JDBC, or integration hubs. The choice depends on the external system's capabilities and the type of data exchange required." },
                    { question: "What is 'ServiceNow Studio'?", answer: "ServiceNow Studio is an integrated development environment (IDE) within the ServiceNow platform that allows developers to create, customize, and manage applications. It provides tools for scripting, UI design, and workflow creation." },
                    { question: "Explain 'Application Scoping' in ServiceNow.", answer: "Application scoping defines the boundaries of an application, controlling which tables, scripts, and other artifacts it can access. It prevents applications from interfering with each other and enhances security and upgradeability." },
                    { question: "What are 'Client Scripts' in ServiceNow, and what are their types?", answer: "Client Scripts are JavaScript code that runs on the client-side (browser). Types include `onLoad` (runs when form loads), `onChange` (runs when field value changes), `onSubmit` (runs when form is submitted), and `onCellEdit` (runs when a list cell is edited)." },
                    { question: "How do you use 'Scheduled Jobs' in ServiceNow?", answer: "Scheduled Jobs are used to automate tasks that need to run at specific intervals or times. They can execute scripts, generate reports, or trigger events without manual intervention." },
                    { question: "What is 'Discovery' in ServiceNow, and why is it important?", answer: "Discovery is a ServiceNow feature that automatically finds and maps IT infrastructure components (CIs) in an organization's network and populates the CMDB. It's important for maintaining an accurate CMDB, which is foundational for ITSM processes." },
                    { question: "What is a 'Record Producer' in ServiceNow?", answer: "A Record Producer is a catalog item that allows users to create task-based records (e.g., incidents, change requests) from the Service Catalog. It provides a user-friendly form that maps inputs to fields on the target table." },
                    { question: "Explain the concept of 'Service Level Agreements (SLAs)' in ServiceNow.", answer: "SLAs define the agreed-upon level of service between a service provider and a customer. In ServiceNow, SLAs track and manage the delivery of services, ensuring that response and resolution times are met for incidents, problems, and other tasks." },
                    { question: "What is the 'Knowledge Base' in ServiceNow?", answer: "The Knowledge Base is a centralized repository for articles, FAQs, and other information that helps users find answers to common questions and resolve issues themselves. It promotes self-service and reduces the load on support teams." },
                    { question: "How do you manage 'User Criteria' in ServiceNow?", answer: "User Criteria are used to control access to knowledge articles, catalog items, and other records based on specific conditions (e.g., user's role, group, company). They ensure that only authorized users can view or request certain items." },
                    { question: "What is the purpose of 'Performance Analytics' in ServiceNow?", answer: "Performance Analytics is a module that provides real-time insights into IT service delivery and operations. It uses dashboards, scorecards, and historical data to identify trends, predict future performance, and drive continuous improvement." }
                ],
                linux: [
                    { question: "List and explain five common Linux commands you use regularly for file system navigation and manipulation.", answer: "`ls` (list directory contents), `cd` (change directory), `pwd` (print working directory), `mkdir` (make directory), `rm` (remove files or directories), `cp` (copy files/directories), `mv` (move/rename files/directories)." },
                    { question: "How do you view the contents of a text file in the terminal without opening it in an editor? Name a few commands.", answer: "`cat` (concatenate and display), `less` (view content page by page), `more` (view content screen by screen), `head` (view beginning of file), `tail` (view end of file)." },
                    { question: "Explain the concept of file permissions in Linux (read, write, execute) and how you would change them.", answer: "Permissions are for owner, group, and others: `r` (read), `w` (write), `x` (execute). Change using `chmod` (e.g., `chmod 755 myfile.sh` for rwx for owner, rx for group/others, or `chmod u+x myfile.sh`)." },
                    { question: "How do you install new software packages on a Debian-based Linux distribution like Ubuntu or Zorin?", answer: "Using `apt` (Advanced Package Tool) commands: `sudo apt update` (update package lists), `sudo apt install <package-name>` (install a package), `sudo apt upgrade` (upgrade installed packages)." },
                    { question: "What is the purpose of the `sudo` command?", answer: "`sudo` (superuser do) allows a permitted user to execute a command as the superuser (root) or another user, as specified by the security policy. It's used for administrative tasks that require elevated privileges." },
                    { question: "Explain the difference between an absolute path and a relative path in the Linux file system.", answer: "Absolute path: Starts from the root directory (`/`) and specifies the full path to a file/directory (e.g., `/home/user/documents/file.txt`). Relative path: Specifies the path relative to the current working directory (e.g., `documents/file.txt` or `../other_dir`)." },
                    { question: "What is a shell script, and when would you use one in a development context?", answer: "A shell script is a text file containing a sequence of commands for the shell to execute. Use cases: automating repetitive tasks (e.g., build scripts, deployment scripts, backup routines), setting up development environments, or running complex command sequences." },
                    { question: "How would you identify and terminate a running process in Linux using the terminal?", answer: "Identify: `ps aux | grep <process_name>` or `top`. Terminate: `kill <PID>` (graceful), `kill -9 <PID>` (forceful), or `pkill <process_name>`." },
                    { question: "Explain the difference between a hard link and a symbolic (soft) link in Linux.", answer: "Hard link: A direct pointer to the inode of a file; if original is deleted, data remains accessible via hard link. Symbolic link: A separate file that contains the path to another file or directory; if original is deleted, symlink breaks." },
                    { question: "How do you compress and decompress files or directories in Linux using common utilities?", answer: "Compress: `tar -czvf archive.tar.gz <files/directories>` (for .tar.gz), `zip archive.zip <files/directories>`. Decompress: `tar -xzvf archive.tar.gz`, `unzip archive.zip`." },
                    { question: "What is the purpose of the `man` command?", answer: "`man` (manual) is used to display the manual pages for commands, utilities, and functions, providing detailed information about their usage, options, and examples." },
                    { question: "How do you redirect output from a command to a file in Linux?", answer: "Use `>` to redirect stdout (e.g., `ls -l > output.txt`). Use `>>` to append (e.g., `echo 'new line' >> output.txt`). Use `2>` for stderr, or `&>` for both stdout and stderr." },
                    { question: "What is the `grep` command used for?", answer: "`grep` (global regular expression print) is used for searching plain-text data sets for lines that match a regular expression or pattern." },
                    { question: "Explain the concept of 'piping' (`|`) in Linux.", answer: "Piping connects the standard output of one command to the standard input of another command. This allows you to chain commands together, where the output of the first command becomes the input for the second." },
                    { question: "How do you check the disk space usage in Linux?", answer: "Use the `df` command (`df -h` for human-readable format) to report file system disk space usage. Use `du` (`du -sh <directory>`) to estimate file space usage." },
                    { question: "What is the difference between a process and a daemon in Linux?", answer: "A process is an instance of a running program. A daemon is a special type of process that runs in the background, typically without direct user interaction, performing system-wide tasks (e.g., web server, print spooler)." },
                    { question: "How do you schedule tasks to run automatically at specific times in Linux?", answer: "Using `cron` jobs. You edit the crontab (`crontab -e`) to define commands or scripts to run at specified intervals (e.g., daily, weekly, at a specific time)." },
                    { question: "Explain the purpose of the `/etc/fstab` file.", answer: "The `/etc/fstab` file is a system configuration table that contains information about all the disk partitions and network file systems in a system. It's used by the `mount` command to automatically mount file systems at boot time." },
                    { question: "What is SSH, and how is it used in Linux?", answer: "SSH (Secure Shell) is a cryptographic network protocol for secure remote login and command-line execution over an unsecured network. It's widely used to securely access and manage Linux servers remotely." },
                    { question: "How do you manage users and groups in Linux?", answer: "Users are managed with commands like `useradd`, `usermod`, `userdel`. Groups are managed with `groupadd`, `groupmod`, `groupdel`. `passwd` changes user passwords." },
                    { question: "What is the purpose of the `ping` command?", answer: "`ping` is a network utility used to test the reachability of a host on an Internet Protocol (IP) network and to measure the round-trip time for messages sent from the originating host to a destination computer." },
                    { question: "Explain the concept of 'environment variables' in Linux.", answer: "Environment variables are dynamic named values that affect the way running processes behave. They store configuration information (e.g., `PATH`, `HOME`, `LANG`) and can be set globally or for specific sessions." },
                    { question: "How do you view currently running processes in Linux?", answer: "Use `ps` (e.g., `ps aux` for all processes), `top` (interactive real-time view), or `htop` (enhanced interactive process viewer)." },
                    { question: "What is the difference between a 'package manager' and a 'package' in Linux?", answer: "A package manager (e.g., `apt`, `yum`, `dnf`) is a system that automates the process of installing, upgrading, configuring, and removing software packages. A package is an archive file containing the software, metadata, and instructions for installation." },
                    { question: "How do you check the network configuration of a Linux system?", answer: "Use commands like `ip addr show` or `ifconfig` (older) to view IP addresses and network interfaces. `ip route show` or `netstat -rn` to view routing tables. `cat /etc/resolv.conf` for DNS servers." },
                    { question: "What is the purpose of the `journalctl` command?", answer: "`journalctl` is used to query and display messages from the systemd journal. It provides a centralized way to view logs from the kernel, services, and applications." },
                    { question: "How do you manage services in Linux (e.g., start, stop, restart)?", answer: "Using `systemctl` (for systemd-based systems): `sudo systemctl start <service-name>`, `sudo systemctl stop <service-name>`, `sudo systemctl restart <service-name>`, `sudo systemctl enable <service-name>` (to start on boot)." },
                    { question: "Explain the concept of 'inodes' in Linux.", answer: "An inode is a data structure in a Unix-style file system that describes a file system object such as a file or a directory. Each inode stores the attributes and disk block locations of the object's data. Directories are lists of names and inode numbers." },
                    { question: "What is the difference between `&` and `&&` in shell commands?", answer: "`&` runs a command in the background. `&&` is a logical AND operator; the second command runs only if the first command succeeds." },
                    { question: "How do you find files in Linux using the terminal?", answer: "Use the `find` command (e.g., `find /home/user -name '*.txt'` to find all .txt files in a directory). You can specify various criteria like name, type, size, modification time." },
                    { question: "What is a 'runlevel' in Linux (SysVinit context)?", answer: "A runlevel is a state of initialization for a Linux system, defining which system services are running. Common runlevels: 0 (halt), 1 (single-user), 3 (multi-user, text mode), 5 (multi-user, graphical mode), 6 (reboot)." },
                    { question: "Explain the purpose of the `/dev` directory.", answer: "The `/dev` directory contains special files called device files or pseudo-device files. These files represent physical hardware devices (e.g., `/dev/sda` for a hard drive) or virtual devices (e.g., `/dev/null`)." },
                    { question: "How do you monitor system resources (CPU, memory) in Linux?", answer: "Use `top`, `htop` (interactive), `free -h` (memory), `vmstat` (virtual memory statistics), `iostat` (CPU and I/O statistics), `sar` (system activity reporter)." },
                    { question: "What is the difference between `su` and `sudo`?", answer: "`su` (substitute user) switches to another user account (often root), requiring that user's password. `sudo` (superuser do) executes a single command as another user (often root), requiring the current user's password." },
                    { question: "How do you create and manage user groups in Linux?", answer: "`groupadd <groupname>` creates a new group. `usermod -aG <groupname> <username>` adds a user to a group. `groupdel <groupname>` deletes a group. `groups <username>` shows groups a user belongs to." }
                ],
                google_workspace: [
                    { question: "How do you leverage Google Workspace tools (Docs, Sheets, Slides) for collaborative documentation and project planning in a team environment?", answer: "Google Docs for real-time collaborative documentation, Sheets for task tracking and data organization with shared access, and Slides for team presentations. Features like comments, suggestions, and revision history are crucial for teamwork." },
                    { question: "Describe a scenario where you used Google Sheets to organize or analyze data for a technical project.", answer: "I used Google Sheets to track tasks and progress for my Magno Charge project, assigning responsibilities, setting deadlines, and monitoring completion status. It allowed the team to have a centralized, real-time view of our project's development pipeline." },
                    { question: "How does Google Drive facilitate version control and sharing of project files among team members?", answer: "Google Drive automatically saves versions of files, allowing you to revert to previous states. For sharing, you can grant specific permissions (viewer, commenter, editor) to individuals or groups, ensuring controlled access and collaboration on project documents." },
                    { question: "Have you ever used Google Apps Script to automate tasks or integrate functionalities within Google Workspace? (This is a more technical question for this category)", answer: "While I haven't extensively used Google Apps Script for complex integrations, I understand its capability to automate tasks like sending automated emails based on Sheet data or creating custom menus in Docs, which could be very useful for streamlining project workflows." },
                    { question: "How do you manage access permissions for shared documents or folders within Google Workspace to ensure data security?", answer: "I use granular sharing settings to control access, granting 'Viewer' for broad distribution, 'Commenter' for feedback, and 'Editor' only to direct collaborators. I also utilize shared drives for team projects to centralize permissions and ownership, ensuring data security and preventing accidental deletion." },
                    { question: "What are the advantages of using a cloud-based office suite like Google Workspace compared to desktop applications for a development team?", answer: "Advantages include real-time collaboration, automatic saving and version history, accessibility from any device/location, reduced software maintenance, and seamless integration with other cloud services, all of which boost team productivity and flexibility." },
                    { question: "Describe your experience with using Google Meet or other Google Workspace communication tools for team meetings or presentations.", answer: "I regularly use Google Meet for virtual team meetings and project discussions, especially during remote work for my virtual internships. Its screen sharing and recording features are particularly useful for technical demonstrations and reviewing project progress." },
                    { question: "How do you organize your personal and project-related files within Google Drive for efficient retrieval?", answer: "I organize files using a hierarchical folder structure, categorizing by project, client, or type of document. I also leverage Google Drive's search functionality and star important files for quick access, ensuring efficient retrieval of information." },
                    { question: "Can you explain how Google Forms or Google Sites might be used in a simplified internal tool or data collection process for a development team?", answer: "Google Forms could be used to quickly collect feedback from internal users on a new feature or to gather requirements for a small project. Google Sites could serve as a simple internal knowledge base or project dashboard for quick access to key information." },
                    { question: "What are some best practices for collaborative editing in Google Docs or Sheets to avoid conflicts or data loss?", answer: "Best practices include using the 'Suggesting' mode for proposed changes, frequently checking revision history, communicating with collaborators about major edits, and using comments for discussions rather than direct inline edits for clarity." },
                    { question: "How do you share files and folders securely in Google Drive?", answer: "Files and folders can be shared with specific individuals or groups via email, with options for 'Viewer', 'Commenter', or 'Editor' access. You can also set expiration dates for access or restrict downloading/printing for sensitive documents." },
                    { question: "What is the purpose of Google Calendar in a team setting?", answer: "Google Calendar is used for scheduling meetings, setting reminders for deadlines, and coordinating team availability. Shared calendars help everyone stay updated on project milestones and team events." },
                    { question: "How does Google Chat integrate with other Google Workspace applications for team communication?", answer: "Google Chat integrates with Gmail, Calendar, and Drive, allowing users to share files, schedule meetings, and collaborate on documents directly within chat conversations, centralizing communication and workflow." },
                    { question: "What are some ways to automate tasks in Google Sheets without using Apps Script?", answer: "Basic automation can be done using built-in functions, conditional formatting, data validation, and pivot tables. Features like 'Named Ranges' and 'Protected Ranges' also help in organizing and securing data." },
                    { question: "How do you use Google Keep or Google Tasks for personal or project-related notes and to-do lists?", answer: "Google Keep is great for quick notes, checklists, and reminders, often used for brainstorming or capturing ideas on the go. Google Tasks is integrated with Calendar and Gmail, ideal for managing actionable to-do lists linked to specific deadlines or emails." },
                    { question: "Describe how Google Workspace facilitates remote collaboration.", answer: "Google Workspace facilitates remote collaboration through real-time co-editing in Docs/Sheets/Slides, integrated video conferencing (Meet), shared calendars, and centralized file storage in Drive, allowing teams to work together seamlessly from anywhere." },
                    { question: "What is the benefit of using Google Forms for data collection in a project?", answer: "Google Forms provides an easy-to-use interface for creating surveys and quizzes, automatically collecting responses in a Google Sheet. This simplifies data collection, ensures consistency, and allows for quick analysis." },
                    { question: "How can Google Sites be used for internal team communication or knowledge sharing?", answer: "Google Sites can be used to create simple internal wikis, project dashboards, or team homepages. It's a quick way to centralize important information, documents, and links for easy access by team members." },
                    { question: "Explain the concept of 'Shared Drives' in Google Drive.", answer: "Shared Drives (formerly Team Drives) are shared spaces where teams can store, search, and access their files. Files in a Shared Drive belong to the team, not an individual, simplifying permission management and ensuring continuity if members leave." },
                    { question: "How do you manage tasks and deadlines using Google Calendar and Google Tasks?", answer: "Google Calendar allows scheduling events, setting reminders, and blocking out time for tasks. Google Tasks integrates with Calendar and Gmail, enabling creation of to-do lists, setting due dates, and tracking task completion directly within the workflow." },
                    { question: "What are 'Add-ons' in Google Workspace, and how do they extend functionality?", answer: "Add-ons are third-party applications that integrate with Google Workspace apps (Docs, Sheets, Slides, Gmail) to add new features or automate workflows. They extend functionality by providing specialized tools not built into the core apps." },
                    { question: "How do you use Google Chat for quick team communication and project updates?", answer: "Google Chat provides real-time messaging, direct messages, and spaces for group conversations. It's used for quick updates, sharing links, asking questions, and informal discussions, reducing email clutter for rapid communication." },
                    { question: "What is the purpose of 'Version History' in Google Docs/Sheets/Slides?", answer: "Version History allows you to view all past edits made to a document, see who made them, and revert to any previous version. This is crucial for tracking changes, collaborating effectively, and recovering from accidental edits." },
                    { question: "How do you use Google Meet's features for effective virtual meetings?", answer: "Effective use includes screen sharing for presentations/demos, chat for questions/links, recording meetings for absent members, and using virtual backgrounds for privacy. Scheduling via Google Calendar ensures all participants have the meeting link." },
                    { question: "Explain how Google Forms can be used for feedback collection in a software development cycle.", answer: "Google Forms can be used to collect user feedback on new features, bug reports, or usability testing results. It provides a structured way to gather input, which can then be analyzed in Google Sheets to inform development decisions." },
                    { question: "What is 'Google Cloud Search' and how does it benefit an organization?", answer: "Google Cloud Search is an intelligent search for Google Workspace that helps employees quickly find information across their company's data (Gmail, Drive, Docs, etc.). It benefits by improving productivity and reducing time spent searching for information." },
                    { question: "How do you use 'Google Groups' for team communication and access management?", answer: "Google Groups can be used to create email lists for team communication, allowing you to send emails to multiple members with a single address. They can also manage access to shared documents and calendars, simplifying permission control for teams." },
                    { question: "What is the benefit of using 'Google Jamboard' for team brainstorming?", answer: "Google Jamboard is an interactive whiteboard that allows for real-time collaborative brainstorming. It's beneficial for visual thinkers, remote teams, and for quickly capturing ideas and sketches during meetings." },
                    { question: "How does 'Google Vault' contribute to data governance and eDiscovery?", answer: "Google Vault is an archiving and eDiscovery tool for Google Workspace data. It helps organizations retain, hold, search, and export data for legal and compliance purposes, contributing to data governance and regulatory compliance." },
                    { question: "Explain the concept of 'Google Workspace Admin Console'.", answer: "The Google Workspace Admin Console is the central place for administrators to manage all aspects of their organization's Google Workspace services, including users, groups, security settings, applications, and billing." }
                ],
                react: [
                    { question: "What is React, and what are its key features and benefits for building user interfaces?", answer: "React is a JavaScript library for building user interfaces, particularly single-page applications. Key features: component-based architecture, Virtual DOM, JSX. Benefits: declarative syntax, efficient updates, reusability, strong community support." },
                    { question: "Explain the concept of the Virtual DOM and how React uses it to improve performance.", answer: "The Virtual DOM is a lightweight copy of the actual DOM. When state changes, React updates the Virtual DOM, compares it to the previous version (diffing), and then efficiently updates only the necessary parts of the real DOM, minimizing direct DOM manipulation for better performance." },
                    { question: "Differentiate between functional components and class components in React.", answer: "Functional Components: JavaScript functions that return JSX. Simpler, easier to test, and use Hooks for state/lifecycle. Class Components: ES6 classes extending `React.Component`. Use `this.state` and lifecycle methods. Functional components with Hooks are now preferred for most use cases." },
