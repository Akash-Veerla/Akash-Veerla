                    { question: "What are React Hooks? Name a few common Hooks and explain their purpose.", answer: "Hooks are functions that let you 'hook into' React state and lifecycle features from functional components. Common Hooks: `useState` (for managing state), `useEffect` (for side effects like data fetching, subscriptions), `useContext` (for consuming context)." },
                    { question: "Explain the component lifecycle in React. How do you handle side effects in functional components?", answer: "Component lifecycle stages (for class components): Mounting, Updating, Unmounting. In functional components, side effects (data fetching, DOM manipulation, subscriptions) are handled using the `useEffect` Hook. It runs after every render by default, and can be controlled with a dependency array." },
                    { question: "How do you manage state in React applications? Describe `useState` and `Context API`.", answer: "`useState`: A Hook for adding state to functional components. Returns a stateful value and a function to update it. `Context API`: Provides a way to pass data through the component tree without having to pass props down manually at every level (for global state or props drilling avoidance)." },
                    { question: "What is JSX, and why is it used in React?", answer: "JSX (JavaScript XML) is a syntax extension for JavaScript that allows you to write HTML-like code directly within your JavaScript files. It's used because it makes it easier to write and understand React components by visually describing the UI structure." },
                    { question: "How do you pass data from a parent component to a child component in React? What about from child to parent?", answer: "Parent to child: Data is passed via `props`. Child to parent: A function is passed as a prop from the parent to the child. The child then calls this function, passing data as an argument, which the parent can then receive." },
                    { question: "What is the purpose of the `useEffect` Hook? Provide a simple example of its usage.", answer: "`useEffect` is used for side effects in functional components. It runs after every render (by default) and after the first render. Example: `useEffect(() => { document.title = 'Hello'; }, []);` (sets document title once on mount)." },
                    { question: "Describe a challenge you faced while building a React application (even if it was a small personal project) and how you overcame it.", answer: "While building a small data visualization dashboard, I struggled with managing state updates across multiple nested components efficiently. I initially had too much state in the parent. I overcame this by refactoring to lift state up where necessary, but also by using `useContext` for truly global data, which significantly simplified prop drilling and component re-renders." },
                    { question: "What is 'prop drilling' in React, and how can you avoid it?", answer: "Prop drilling is the process of passing data from a parent component down to a deeply nested child component through multiple intermediate components that don't actually need the data. It can be avoided using Context API, Redux, or component composition." },
                    { question: "Explain the concept of 'controlled components' in React forms.", answer: "In a controlled component, form data is handled by React state. Every state mutation will have an associated handler function. This means React controls the value of the input element, making the state the 'single source of truth'." },
                    { question: "What is the significance of keys in React lists?", answer: "Keys help React identify which items have changed, are added, or are removed. They give a stable identity to elements in a list, improving performance and preventing issues with component state when list items are reordered or filtered." },
                    { question: "What is the purpose of `React.memo()`?", answer: "`React.memo()` is a higher-order component that lets you memoize functional components. It prevents a component from re-rendering if its props haven't changed, optimizing performance for components that render frequently with the same props." },
                    { question: "How do you handle routing in a React application?", answer: "Routing in React is typically handled using a library like React Router. It allows you to define different routes for different components, enabling navigation between views without full page reloads." },
                    { question: "Explain the concept of 'lifting state up' in React.", answer: "Lifting state up is a pattern where if multiple child components need to access or modify the same state, that state is moved to their closest common ancestor. The parent then passes the state and functions to update it down as props." },
                    { question: "What is the difference between `useState` and `useReducer`?", answer: "`useState` is for simple state management. `useReducer` is an alternative for more complex state logic, especially when state transitions depend on the previous state or involve multiple sub-values, similar to Redux." },
                    { question: "How would you optimize the performance of a React application?", answer: "Optimization techniques include using `React.memo()`, `useCallback()`, `useMemo()`, lazy loading components (`React.lazy`, `Suspense`), code splitting, optimizing image sizes, and avoiding unnecessary re-renders." },
                    { question: "What are 'Higher-Order Components (HOCs)' in React?", answer: "HOCs are a pattern in React for reusing component logic. They are functions that take a component as an argument and return a new component with enhanced functionality (e.g., `withRouter`, `connect` from Redux)." },
                    { question: "Explain the concept of 'Refs' in React. When would you use them?", answer: "Refs provide a way to access DOM nodes or React elements created in the render method. They are used sparingly, typically for managing focus, text selection, media playback, or integrating with third-party DOM libraries." },
                    { question: "What is the role of 'Babel' in a React project?", answer: "Babel is a JavaScript compiler that converts modern JavaScript (like ES6+, JSX) into backward-compatible versions of JavaScript that can be run by older browsers or environments. It's essential for transpiling JSX into `React.createElement` calls." },
                    { question: "What is 'Webpack' and its role in a React project?", answer: "Webpack is a module bundler. It takes all your JavaScript, CSS, and other assets, and bundles them into a few optimized files for deployment. It handles dependencies, minification, and hot module replacement." },
                    { question: "Describe the concept of 'Error Boundaries' in React.", answer: "Error boundaries are React components that catch JavaScript errors anywhere in their child component tree, log those errors, and display a fallback UI instead of crashing the entire application. They only catch errors in rendering, lifecycle methods, and constructors." },
                    { question: "What is the purpose of `StrictMode` in React?", answer: "`StrictMode` is a tool for highlighting potential problems in an application. It activates additional checks and warnings for its descendants, but it does not render any visible UI. It helps identify deprecated features or bad practices." },
                    { question: "How do you handle asynchronous operations (e.g., API calls) in React components?", answer: "Asynchronous operations are typically handled within `useEffect` hooks. You can use `async/await` syntax with `fetch` or `axios` for cleaner asynchronous code. State is updated once data is fetched." },
                    { question: "Explain the difference between `props.children` and passing components as props.", answer: "`props.children` is a special prop that automatically contains whatever is passed between a component's opening and closing tags. Passing components as props involves explicitly defining a prop that accepts a React element or component as its value." },
                    { question: "What is 'memoization' in React, and how is it achieved?", answer: "Memoization is an optimization technique that stores the result of expensive function calls and returns the cached result when the same inputs occur again. In React, it's achieved using `React.memo()` for components and `useMemo()` / `useCallback()` for values and functions." },
                    { question: "Describe the concept of 'Server-Side Rendering (SSR)' in React.", answer: "SSR involves rendering React components to HTML on the server, then sending that HTML to the client. This improves initial page load performance and SEO, as the browser receives a fully rendered page immediately." },
                    { question: "What is the purpose of the `useCallback` Hook?", answer: "`useCallback` returns a memoized callback function. It's useful when passing callbacks to optimized child components that rely on reference equality to prevent unnecessary re-renders. It prevents the callback from being recreated on every render unless its dependencies change." },
                    { question: "What is the purpose of the `useMemo` Hook?", answer: "`useMemo` returns a memoized value. It's useful for optimizing expensive calculations that don't need to be re-calculated on every render. It only re-computes the memoized value when one of its dependencies has changed." },
                    { question: "Explain the concept of 'React Fragments'.", answer: "React Fragments allow you to group a list of children without adding extra nodes to the DOM. This is useful when a component needs to return multiple elements but doesn't need a wrapper `div`." },
                    { question: "What is 'Redux' and when would you use it in a React application?", answer: "Redux is a predictable state container for JavaScript apps. It's often used with React for managing complex global application state, especially in large applications where state needs to be shared across many components and updated predictably." },
                    { question: "Differentiate between 'controlled' and 'uncontrolled' components in React forms.", answer: "Controlled components have their form data handled by React state, making the state the 'single source of truth'. Uncontrolled components manage their own form data internally, typically using refs to get their values from the DOM." },
                    { question: "What is the purpose of 'Portals' in React?", answer: "Portals provide a way to render children into a DOM node that exists outside the DOM hierarchy of the parent component. They are useful for modals, tooltips, and other UI elements that need to break out of their parent's styling or stacking context." },
                    { question: "Explain 'Custom Hooks' in React.", answer: "Custom Hooks are JavaScript functions whose names start with 'use' and that can call other Hooks. They allow you to reuse stateful logic across different components without sharing the state itself." }
                ],
                ai_ml_dl: [
                    { question: "Differentiate between Artificial Intelligence (AI), Machine Learning (ML), and Deep Learning (DL).", answer: "AI is the broad field of creating intelligent machines. ML is a subset of AI where systems learn from data without explicit programming. DL is a subset of ML that uses neural networks with multiple layers to learn complex patterns." },
                    { question: "Explain the concept of 'supervised learning' in ML. Provide an example.", answer: "Supervised learning involves training a model on a labeled dataset (input-output pairs). The model learns a mapping from inputs to outputs. Example: Predicting house prices based on features (size, location) and known past prices." },
                    { question: "What is 'unsupervised learning'? Give an example.", answer: "Unsupervised learning involves training a model on unlabeled data to find hidden patterns or structures. Example: Clustering customer data into different segments based on their purchasing behavior without predefined categories." },
                    { question: "What is 'overfitting' in machine learning, and how can it be mitigated?", answer: "Overfitting occurs when a model learns the training data too well, including noise, and performs poorly on unseen data. Mitigation techniques include cross-validation, regularization (L1/L2), increasing training data, feature selection, and early stopping." },
                    { question: "Explain the purpose of 'training data', 'validation data', and 'test data' in an ML project.", answer: "Training data: Used to train the model. Validation data: Used to tune hyperparameters and prevent overfitting during model development. Test data: Used to evaluate the final model's performance on unseen data, providing an unbiased assessment." },
                    { question: "You've worked with Azure AI Document Intelligence. How does it leverage AI/ML for data extraction?", answer: "Azure AI Document Intelligence uses pre-trained and custom machine learning models to extract text, key-value pairs, tables, and structures from documents. It goes beyond simple OCR by understanding the layout and semantic meaning of content." },
                    { question: "What is Natural Language Processing (NLP), and how did you use Azure AI Language for it?", answer: "NLP is a field of AI that enables computers to understand, interpret, and generate human language. I used Azure AI Language to perform tasks like sentiment analysis (determining emotional tone) and named entity recognition (identifying entities like people, organizations, locations) from text data." },
                    { question: "Describe the core idea behind 'Generative AI' based on your Google Cloud certification.", answer: "Generative AI models learn patterns from existing data to generate new, realistic, and novel content (text, images, code, etc.). The core idea is to create models that can understand and reproduce the underlying distribution of the training data." },
                    { question: "What are 'neural networks' in the context of Deep Learning?", answer: "Neural networks are a series of algorithms that mimic the human brain's structure and function. They consist of interconnected layers of 'neurons' that process information, learn patterns, and make predictions, especially effective for complex, high-dimensional data." },
                    { question: "Explain the concept of 'prompt engineering' in Generative AI.", answer: "Prompt engineering is the art and science of crafting effective inputs (prompts) to guide a generative AI model to produce desired outputs. It involves structuring text, providing context, and specifying constraints to elicit precise and relevant responses from the model." },
                    { question: "What is a 'feature' in machine learning?", answer: "A feature is an individual measurable property or characteristic of a phenomenon being observed. In a dataset, features are the columns that represent the input variables used to predict an outcome." },
                    { question: "What is a 'confusion matrix' and what metrics can you derive from it?", answer: "A confusion matrix is a table used to evaluate the performance of a classification model. From it, you can derive metrics like Accuracy, Precision, Recall (Sensitivity), F1-Score, True Positives, False Positives, True Negatives, and False Negatives." },
                    { question: "Briefly explain what 'reinforcement learning' is.", answer: "Reinforcement learning is a type of machine learning where an agent learns to make decisions by performing actions in an environment to maximize a cumulative reward. It learns through trial and error, getting feedback (rewards or penalties) for its actions." },
                    { question: "What is the role of 'data preprocessing' in an AI/ML pipeline?", answer: "Data preprocessing involves cleaning, transforming, and preparing raw data into a suitable format for machine learning models. This includes handling missing values, encoding categorical data, scaling features, and removing outliers, which is crucial for model performance." },
                    { question: "What are some common applications of Deep Learning?", answer: "Common applications include image recognition (e.g., facial recognition, object detection), natural language processing (e.g., machine translation, chatbots), speech recognition, and recommendation systems." },
                    { question: "Explain the bias-variance trade-off in machine learning.", answer: "The bias-variance trade-off refers to the conflict in trying to simultaneously minimize two sources of error that prevent supervised learning algorithms from generalizing beyond their training data: bias (error from erroneous assumptions in the learning algorithm) and variance (error from sensitivity to small fluctuations in the training set)." },
                    { question: "What is 'regularization' in ML, and name a few types.", answer: "Regularization is a technique used to prevent overfitting by adding a penalty term to the loss function, discouraging complex models. Types include L1 Regularization (Lasso), L2 Regularization (Ridge), and Dropout (for neural networks)." },
                    { question: "Describe the 'Gradient Descent' algorithm.", answer: "Gradient Descent is an optimization algorithm used to minimize the cost function of a model by iteratively moving in the direction of steepest descent of the function. It finds the optimal parameters (weights and biases) for the model." },
                    { question: "What are 'hyperparameters' in machine learning?", answer: "Hyperparameters are parameters whose values are set before the learning process begins (e.g., learning rate, number of hidden layers, batch size). They control the learning process itself, unlike model parameters which are learned during training." },
                    { question: "Explain the concept of 'transfer learning' in Deep Learning.", answer: "Transfer learning is a technique where a model trained on one task is re-purposed or fine-tuned for a second related task. It's particularly useful in deep learning where large pre-trained models (e.g., on ImageNet) can be adapted for new image classification tasks with less data." },
                    { question: "What is a 'Convolutional Neural Network (CNN)' and where is it typically used?", answer: "A CNN is a type of neural network specifically designed to process pixel data, commonly used in image recognition and computer vision. It uses convolutional layers to automatically and adaptively learn spatial hierarchies of features from input images." },
                    { question: "What is an 'Activation Function' in neural networks?", answer: "An activation function introduces non-linearity into the output of a neuron. Without it, a neural network would just be a linear regression model. Common examples include ReLU, Sigmoid, and Tanh." },
                    { question: "Describe the purpose of 'cross-validation' in ML.", answer: "Cross-validation is a technique for evaluating ML models by training them on subsets of the input data and testing them on complementary subsets. It helps assess how the model will generalize to an independent dataset and prevents overfitting." },
                    { question: "What is the 'ROC curve' and 'AUC' in model evaluation?", answer: "The ROC (Receiver Operating Characteristic) curve is a plot that illustrates the diagnostic ability of a binary classifier system as its discrimination threshold is varied. AUC (Area Under the ROC Curve) measures the entire 2D area underneath the entire ROC curve, providing an aggregate measure of performance across all possible classification thresholds." },
                    { question: "Explain the concept of 'Embeddings' in NLP.", answer: "Embeddings are dense vector representations of words, phrases, or other discrete data types (like users or items). They capture semantic relationships, allowing models to understand context and similarity between words (e.g., Word2Vec, GloVe)." },
                    { question: "What are 'Recurrent Neural Networks (RNNs)' and what are their primary use cases?", answer: "RNNs are a type of neural network designed to process sequential data (e.g., time series, natural language). They have 'memory' that allows them to use information from previous inputs. Use cases: speech recognition, machine translation, sentiment analysis on sequences." },
                    { question: "What is the 'Exploding Gradients' problem in neural networks, and how is it addressed?", answer: "Exploding gradients occur when large error gradients accumulate during backpropagation, leading to very large updates to neural network model weights, causing instability. Addressed by gradient clipping (constraining gradient magnitude) or using ReLU activation functions." },
                    { question: "What is 'Feature Engineering'?", answer: "Feature engineering is the process of using domain knowledge to select and transform raw data into features that can be used to improve the performance of machine learning models. It's crucial for extracting meaningful information from data." },
                    { question: "Explain the concept of 'Ensemble Learning' in ML.", answer: "Ensemble learning is a technique that combines multiple machine learning models to obtain better predictive performance than could be obtained from any of the constituent models alone. Examples: Random Forest, Gradient Boosting." },
                    { question: "What is the 'Curse of Dimensionality'?", answer: "The Curse of Dimensionality refers to various phenomena that arise when analyzing and organizing data in high-dimensional spaces (many features) that do not occur in low-dimensional settings, such as data becoming sparse, making it difficult to find meaningful patterns or neighbors." },
                    { question: "Differentiate between 'Classification' and 'Regression' tasks in ML.", answer: "Classification: Predicts a categorical output (e.g., spam/not spam, dog/cat). Regression: Predicts a continuous numerical output (e.g., house price, temperature)." },
                    { question: "What is 'Underfitting' in machine learning, and how can it be mitigated?", answer: "Underfitting occurs when a model is too simple to capture the underlying patterns in the training data, leading to poor performance on both training and unseen data. Mitigation: Use a more complex model, add more features, reduce regularization." },
                    { question: "Explain the concept of 'Loss Function' (or Cost Function) in ML.", answer: "A loss function quantifies the error between predicted and actual values. The goal of training an ML model is to minimize this loss function. Different tasks use different loss functions (e.g., Mean Squared Error for regression, Cross-Entropy for classification)." },
                    { question: "What is 'Backpropagation' in neural networks?", answer: "Backpropagation is an algorithm used to train neural networks by calculating the gradient of the loss function with respect to the weights of the network. It propagates the error backward through the network, allowing weights to be adjusted." },
                    { question: "Describe 'Clustering' algorithms and give an example.", answer: "Clustering is an unsupervised learning task of grouping a set of objects in such a way that objects in the same group (cluster) are more similar to each other than to those in other groups. Example: K-Means clustering." },
                    { question: "What is 'Dimensionality Reduction' and why is it used?", answer: "Dimensionality reduction is the process of reducing the number of random variables under consideration by obtaining a set of principal variables. It's used to simplify models, reduce noise, prevent overfitting, and improve visualization. Example: PCA (Principal Component Analysis)." },
                    { question: "Explain 'Precision' and 'Recall' in model evaluation.", answer: "Precision: Of all positive predictions, how many were actually correct (True Positives / (True Positives + False Positives)). Recall: Of all actual positives, how many were correctly identified (True Positives / (True Positives + False Negatives))." },
                    { question: "What is an 'Autoencoder' in Deep Learning?", answer: "An autoencoder is a type of neural network used for unsupervised learning of efficient data codings (features). It learns to compress data from the input layer into a lower-dimensional representation (bottleneck layer) and then reconstructs it in the output layer." },
                    { question: "Describe the 'Generative Adversarial Networks (GANs)' concept.", answer: "GANs consist of two neural networks: a Generator (creates fake data) and a Discriminator (tries to distinguish real from fake data). They are trained in a zero-sum game, where the generator tries to fool the discriminator, and the discriminator tries to get better at detection." },
                    { question: "What is 'One-Hot Encoding' and when is it used?", answer: "One-Hot Encoding is a process of converting categorical variables into a numerical format that can be provided to ML algorithms. Each category value is converted into a new column and assigned a 1 or 0 (true/false) value. Used when categories have no intrinsic order." }
                ],
                oops: [
                    { question: "What is Object-Oriented Programming (OOP)?", answer: "OOP is a programming paradigm based on the concept of 'objects', which can contain data and code to manipulate that data. It aims to organize software design around data, rather than functions and logic." },
                    { question: "Explain the four pillars of OOP: Encapsulation, Inheritance, Polymorphism, and Abstraction.", answer: "Encapsulation: Bundling data and methods within a single unit (class). Inheritance: A class deriving properties/behavior from another. Polymorphism: Objects of different classes treated as a common type. Abstraction: Hiding complexity, showing only essential features." },
                    { question: "Differentiate between a Class and an Object.", answer: "A Class is a blueprint or template for creating objects. An Object is an instance of a class, a real-world entity that has state and behavior." },
                    { question: "What is the difference between a Constructor and a Method?", answer: "A Constructor is a special method used to initialize objects, called automatically when an object is created. A Method is a function associated with an object, performing an action on the object's data." },
                    { question: "Explain Method Overloading vs. Method Overriding.", answer: "Overloading: Multiple methods in the same class with the same name but different parameters. Overriding: Subclass provides a specific implementation for a method already defined in its superclass (same name, same parameters)." },
                    { question: "What is the difference between an Abstract Class and an Interface?", answer: "Abstract Class: Can have abstract/non-abstract methods, constructors, instance variables. A class can extend only one. Interface: Defines a contract, all methods implicitly public abstract (before Java 8). A class can implement multiple." },
                    { question: "What are the benefits of Encapsulation?", answer: "Benefits include data hiding (protecting internal state), better control over data access, easier debugging, and increased flexibility and maintainability as changes to internal implementation don't affect external usage." },
                    { question: "Explain the types of Polymorphism.", answer: "Compile-time (Static) Polymorphism: Achieved through method overloading. Runtime (Dynamic) Polymorphism: Achieved through method overriding, where the method to be called is determined at runtime based on the object's actual type." },
                    { question: "Differentiate between `this` and `super` keywords (in an OOP context).", answer: "`this` refers to the current instance of the class. `super` refers to the immediate parent class instance. Used to access parent's methods, fields, or constructors." },
                    { question: "Explain Association, Aggregation, and Composition in OOP.", answer: "Association: A general relationship between two classes. Aggregation: A 'has-a' relationship where one class owns another, but they can exist independently (e.g., Department has Students). Composition: A 'part-of' relationship where the owned class cannot exist without the owner (e.g., House has Rooms)." },
                    { question: "What are Static vs. Non-static members in OOP?", answer: "Static members (variables/methods) belong to the class itself, shared by all instances, accessed via class name. Non-static (instance) members belong to specific objects, accessed via object instance." },
                    { question: "What are the advantages of OOP?", answer: "Advantages include reusability, modularity, easier debugging, improved maintainability, and better real-world modeling through objects." },
                    { question: "What are some potential disadvantages of OOP?", answer: "Potential disadvantages include increased complexity for simple problems, larger program size, and slower execution time due to layers of abstraction and overhead." },
                    { question: "What is a 'pure virtual function' (C++ context, but general concept)?", answer: "A pure virtual function is a virtual function that has no definition within the base class and is declared by assigning 0. It makes the class abstract, forcing derived classes to provide an implementation." },
                    { question: "What is a 'final' keyword (Java context, but general concept)?", answer: "In Java, `final` can be used with classes (cannot be subclassed), methods (cannot be overridden), or variables (value cannot be changed after initialization). It's used to enforce immutability or prevent extension." },
                    { question: "Explain the concept of 'Coupling' and 'Cohesion' in OOP design.", answer: "Coupling: The degree of interdependence between software modules. Low coupling is desirable. Cohesion: The degree to which the elements within a module belong together. High cohesion is desirable." },
                    { question: "What are 'Design Patterns' in OOP?", answer: "Design Patterns are reusable solutions to common problems in software design. They are not direct code but templates for how to solve problems that can be used in many different situations (e.g., Singleton, Factory, Observer)." },
                    { question: "Describe the 'Liskov Substitution Principle' (LSP) from SOLID principles.", answer: "LSP states that objects of a superclass should be replaceable with objects of its subclasses without affecting the correctness of the program. It ensures that inheritance is used correctly to maintain type compatibility." },
                    { question: "What is 'Composition over Inheritance'?", answer: "It's a design principle favoring the use of object composition (where objects contain instances of other objects) over inheritance for achieving code reuse and flexibility. It reduces tight coupling and allows for more dynamic behavior." },
                    { question: "Explain the concept of 'Delegation' in OOP.", answer: "Delegation is a design pattern where an object, instead of performing an action itself, delegates that action to another helper object. It's a way to achieve code reuse and flexible behavior without inheritance." },
                    { question: "What is the 'Open/Closed Principle' (OCP) from SOLID principles?", answer: "OCP states that software entities (classes, modules, functions, etc.) should be open for extension, but closed for modification. This means you should be able to add new functionality without changing existing code." },
                    { question: "How does 'Abstraction' help in managing complexity?", answer: "Abstraction helps by hiding the complex implementation details and showing only the necessary features of an object. This simplifies the system for the user, allowing them to focus on 'what' an object does rather than 'how' it does it." },
                    { question: "What is a 'Virtual Function' (C++ context)?", answer: "A virtual function is a member function that is declared within a base class and redefined (overridden) by a derived class. When you refer to a derived class object using a pointer or a reference to the base class, you can call a virtual function for that object and execute the derived class's version." },
                    { question: "Explain the 'Dependency Inversion Principle' (DIP) from SOLID principles.", answer: "DIP states that high-level modules should not depend on low-level modules; both should depend on abstractions. Also, abstractions should not depend on details; details should depend on abstractions. This promotes loose coupling." },
                    { question: "What is 'Early Binding' vs. 'Late Binding' (Dynamic Dispatch)?", answer: "Early Binding (Compile-time polymorphism): Method calls are resolved at compile time (e.g., method overloading). Late Binding (Runtime polymorphism/Dynamic Dispatch): Method calls are resolved at runtime based on the actual object type (e.g., method overriding)." },
                    { question: "How can you achieve Polymorphism without Inheritance in Python (Duck Typing)?", answer: "In Python, polymorphism is often achieved through duck typing. If an object has the required methods, it can be used polymorphically, regardless of its class hierarchy. Inheritance is not strictly necessary for this form of polymorphism." },
                    { question: "What is the 'Singleton Pattern'?", answer: "The Singleton pattern ensures that a class has only one instance and provides a global point of access to that instance. It's often used for logging, configuration management, or database connection pools." },
                    { question: "Describe the 'Factory Method Pattern'.", answer: "The Factory Method pattern provides an interface for creating objects in a superclass, but allows subclasses to alter the type of objects that will be created. It defers object instantiation to subclasses." },
                    { question: "What is the 'Observer Pattern'?", answer: "The Observer pattern defines a one-to-many dependency between objects so that when one object changes state, all its dependents are notified and updated automatically. It's often used for event handling systems." },
                    { question: "Explain the 'Interface Segregation Principle' (ISP) from SOLID principles.", answer: "ISP states that clients should not be forced to depend on interfaces they do not use. Instead of one large interface, create multiple smaller, client-specific interfaces. This prevents fat interfaces." },
                    { question: "What is 'Encapsulation' and how is it implemented?", answer: "Encapsulation is the bundling of data (attributes) and methods that operate on the data within a single unit (class), and restricting direct access to some of the object's components. It's implemented using access modifiers (e.g., `private`, `protected` in Java/C++)." },
                    { question: "Explain the concept of 'Inheritance' and its types.", answer: "Inheritance is a mechanism where one class (subclass/derived class) acquires the properties and behaviors of another class (superclass/base class). Types include single, multiple, multilevel, hierarchical, and hybrid inheritance (language dependent)." },
                    { question: "What is 'Polymorphism' and how does it relate to method overriding?", answer: "Polymorphism means 'many forms'. It allows objects of different classes to be treated as objects of a common type. Method overriding is a key way to achieve runtime polymorphism, where a subclass provides a specific implementation for a method already defined in its superclass." },
                    { question: "Describe 'Abstraction' in OOP with an example.", answer: "Abstraction is the process of hiding the implementation details and showing only the essential features of an object. Example: A car's steering wheel is an abstraction; you use it to turn, without needing to know the complex mechanics underneath." },
                    { question: "What are 'Access Modifiers' in OOP?", answer: "Access modifiers (e.g., `public`, `private`, `protected`, default/package-private) control the visibility and accessibility of classes, methods, and variables. They enforce encapsulation." },
                    { question: "What is the 'DRY' principle in OOP design?", answer: "DRY stands for 'Don't Repeat Yourself'. It's a software development principle aimed at reducing repetition of software patterns, replacing them with abstractions or data normalizations to avoid redundancy." },
                    { question: "Explain the difference between 'is-a' and 'has-a' relationships in OOP.", answer: "'Is-a' denotes inheritance (e.g., a Dog is-a Animal). 'Has-a' denotes composition or aggregation (e.g., a Car has-a Engine). These relationships guide class design." },
                    { question: "What is a 'Constructor Overloading'?", answer: "Constructor overloading is when a class has multiple constructors with different parameter lists. This allows objects to be initialized in different ways, providing flexibility during object creation." },
                    { question: "Describe the 'Strategy Pattern'.", answer: "The Strategy Pattern defines a family of algorithms, encapsulates each one, and makes them interchangeable. Strategy lets the algorithm vary independently from clients that use it. Used when you have multiple ways to perform a task." },
                    { question: "What is the 'SOLID' principle in OOP design?", answer: "SOLID is an acronym for five design principles intended to make software designs more understandable, flexible, and maintainable: Single Responsibility, Open/Closed, Liskov Substitution, Interface Segregation, Dependency Inversion." }
                ],
                rdbms: [
                    { question: "What is RDBMS?", answer: "RDBMS (Relational Database Management System) is a type of database system that stores data in tables (relations) with rows and columns. Data is organized into tables that are related to each other based on common fields." },
                    { question: "Explain the ACID properties in RDBMS.", answer: "ACID stands for Atomicity (all or nothing transaction), Consistency (data remains valid after transaction), Isolation (concurrent transactions don't interfere), and Durability (committed data is permanent)." },
                    { question: "Differentiate between Normalization and Denormalization.", answer: "Normalization: Organizing data to reduce redundancy and improve data integrity (e.g., 1NF, 2NF, 3NF, BCNF). Denormalization: Adding redundant data to improve read performance, often by joining tables prematurely." },
                    { question: "What is the difference between a Primary Key and a Foreign Key?", answer: "Primary Key: Uniquely identifies each record in a table; cannot contain NULL values. Foreign Key: A field in one table that refers to the Primary Key in another table, establishing a link between them." },
                    { question: "Compare SQL and NoSQL databases.", answer: "SQL (Relational): Structured, schema-based, uses SQL, ACID compliant, scales vertically. NoSQL (Non-relational): Flexible schema, various data models (document, key-value, graph), BASE properties, scales horizontally." },
                    { question: "Explain different types of JOINs in SQL.", answer: "INNER JOIN (returns matching rows), LEFT JOIN (returns all rows from left table, matching from right), RIGHT JOIN (all from right, matching from left), FULL OUTER JOIN (all rows when there's a match in either table)." },
                    { question: "What are Indexes in RDBMS, and why are they important?", answer: "Indexes are special lookup tables that the database search engine can use to speed up data retrieval. They improve query performance on columns that are frequently used in WHERE clauses or JOIN conditions." },
                    { question: "What is a Transaction in RDBMS?", answer: "A transaction is a single logical unit of work, comprising one or more SQL statements. It's treated as an atomic operation, meaning all its operations must be completed successfully, or none of them are." },
                    { question: "Differentiate between Stored Procedures and Functions in SQL.", answer: "Stored Procedure: A pre-compiled set of SQL statements, can perform DML/DDL, can have `OUT` parameters, does not return a value directly (can return result sets). Function: A pre-compiled set of SQL statements, performs calculations, returns a single value, cannot perform DML/DDL (usually)." },
                    { question: "What is a Trigger in SQL?", answer: "A trigger is a special type of stored procedure that automatically executes or 'fires' when a specific event occurs in the database (e.g., `INSERT`, `UPDATE`, `DELETE` on a table)." },
                    { question: "What is a View in SQL?", answer: "A View is a virtual table based on the result-set of an SQL query. It contains rows and columns, just like a real table, but it doesn't store data itself. It's used to simplify complex queries, restrict data access, or present data in different ways." },
                    { question: "Explain different types of Constraints in SQL.", answer: "Constraints enforce data integrity. Common types: `NOT NULL`, `UNIQUE`, `PRIMARY KEY`, `FOREIGN KEY`, `CHECK` (ensures values meet a condition), `DEFAULT` (sets a default value)." },
                    { question: "What is the difference between `UNION` and `UNION ALL`?", answer: "`UNION` combines the result-set of two or more SELECT statements and removes duplicate rows. `UNION ALL` combines the result-set of two or more SELECT statements and includes all duplicate rows." },
                    { question: "Differentiate between the `HAVING` clause and the `WHERE` clause in SQL.", answer: "`WHERE` filters individual rows *before* grouping. `HAVING` filters groups of rows *after* grouping and aggregation. `HAVING` is used with `GROUP BY`." },
                    { question: "What is a 'deadlock' in a database context?", answer: "A deadlock occurs when two or more transactions are waiting for each other to release locks on resources, creating a circular dependency where none can proceed. Databases have mechanisms to detect and resolve deadlocks (e.g., by aborting one transaction)." },
                    { question: "Explain the concept of 'Transaction Isolation Levels' in RDBMS.", answer: "Isolation levels define how and when changes made by one transaction become visible to other concurrent transactions. Common levels: Read Uncommitted, Read Committed, Repeatable Read, Serializable. Higher isolation means more consistency but potentially less concurrency." },
                    { question: "What is a 'Stored Function' vs. 'User-Defined Function' (UDF) in SQL?", answer: "A Stored Function is a type of stored program that returns a single scalar value. UDFs are functions created by users, which can be scalar (return single value) or table-valued (return a table). Stored functions are a type of UDF." },
                    { question: "Describe the purpose of 'Triggers' in an RDBMS.", answer: "Triggers are special stored procedures that are automatically executed in response to certain events on a table or view (e.g., INSERT, UPDATE, DELETE). They are used for enforcing complex business rules, auditing, or maintaining data integrity." },
                    { question: "What is the difference between a 'Clustered Index' and a 'Non-Clustered Index'?", answer: "Clustered Index: Determines the physical order of data rows in a table. A table can have only one clustered index. Non-Clustered Index: Does not alter the physical order of table rows. It's a separate structure that contains pointers to the data rows. A table can have multiple non-clustered indexes." },
                    { question: "Explain the concept of 'Data Integrity' and its types in RDBMS.", answer: "Data Integrity refers to the accuracy and consistency of data over its entire life-cycle. Types: Entity Integrity (Primary Key rules), Referential Integrity (Foreign Key rules), Domain Integrity (valid values for columns), User-Defined Integrity (custom rules)." },
                    { question: "What is a 'Composite Key'?", answer: "A Composite Key is a primary key that consists of two or more attributes (columns) that together uniquely identify a record in a table. No single attribute in the composite key can uniquely identify the record on its own." },
                    { question: "Differentiate between DDL, DML, DCL, and TCL commands in SQL.", answer: "DDL (Data Definition Language): `CREATE`, `ALTER`, `DROP` (defines database structure). DML (Data Manipulation Language): `SELECT`, `INSERT`, `UPDATE`, `DELETE` (manipulates data). DCL (Data Control Language): `GRANT`, `REVOKE` (manages permissions). TCL (Transaction Control Language): `COMMIT`, `ROLLBACK`, `SAVEPOINT` (manages transactions)." },
                    { question: "What are 'Database Schemas'?", answer: "A database schema is the logical configuration of the entire database. It defines how the data is organized and how the relations among them are associated. It includes table names, column names, data types, constraints, and relationships." },
                    { question: "Explain the concept of 'Indexing Strategy' for query optimization.", answer: "Indexing strategy involves deciding which columns to index, what type of index to use (B-tree, hash, full-text), and whether to use single-column or composite indexes. The goal is to minimize disk I/O and speed up query execution." },
                    { question: "What is a 'Cursor' in SQL?", answer: "A cursor is a database object that enables traversal over the rows in a result set. It allows you to process rows one by one, which is useful for operations that cannot be performed on the entire set at once." },
                    { question: "Describe the 'CAP Theorem' in the context of distributed databases.", answer: "The CAP Theorem states that a distributed database system can only guarantee two out of three properties: Consistency (all nodes see the same data at the same time), Availability (every request receives a response), and Partition Tolerance (system continues to operate despite network partitions)." },
                    { question: "What is 'Referential Integrity'?", answer: "Referential integrity is a property of data that ensures that relationships between tables are valid. It's typically enforced using foreign keys, ensuring that a foreign key value in one table must have a matching primary key value in the related table." },
                    { question: "Explain the purpose of the `GROUP BY` clause and aggregate functions.", answer: "The `GROUP BY` clause groups rows that have the same values in specified columns into a summary row. Aggregate functions (e.g., `COUNT`, `SUM`, `AVG`, `MAX`, `MIN`) then perform calculations on these grouped sets of rows." },
                    { question: "What is the difference between `DELETE`, `TRUNCATE`, and `DROP` commands?", answer: "`DELETE`: Removes rows based on `WHERE` clause, logs each row deletion, can be rolled back. `TRUNCATE`: Removes all rows quickly, deallocates space, cannot be rolled back, no `WHERE` clause. `DROP`: Removes the entire table (structure and data), cannot be rolled back." },
                    { question: "What is 'SQL Injection' and how can it be prevented?", answer: "SQL Injection is a code injection technique used to attack data-driven applications, in which malicious SQL statements are inserted into an entry field for execution. Prevented by using parameterized queries (prepared statements), input validation, and escaping special characters." },
                    { question: "Explain the concept of 'Database Normal Forms' (1NF, 2NF, 3NF).", answer: "Normal Forms are guidelines for structuring database tables to reduce data redundancy and improve data integrity. 1NF: Atomic values, no repeating groups. 2NF: 1NF + no partial dependencies. 3NF: 2NF + no transitive dependencies." },
                    { question: "What is a 'Subquery' in SQL?", answer: "A subquery (or inner query) is a query nested inside another SQL query. It can be used in `SELECT`, `INSERT`, `UPDATE`, or `DELETE` statements, and also with operators like `IN`, `EXISTS`, `ANY`, `ALL`." },
                    { question: "Differentiate between `ROW_NUMBER()`, `RANK()`, and `DENSE_RANK()` window functions.", answer: "`ROW_NUMBER()`: Assigns a unique, sequential integer to each row within its partition. `RANK()`: Assigns a rank within its partition, with gaps for ties. `DENSE_RANK()`: Assigns a rank within its partition, without gaps for ties." },
                    { question: "What is 'Optimistic Concurrency Control' vs. 'Pessimistic Concurrency Control'?", answer: "Optimistic: Assumes conflicts are rare; transactions proceed without locking and validate at commit time. Pessimistic: Assumes conflicts are common; transactions acquire locks on resources before accessing them, preventing concurrent access." },
                    { question: "Explain the purpose of the `EXPLAIN` (or `EXPLAIN ANALYZE`) command in SQL.", answer: "`EXPLAIN` provides information about how a database system executes a query. It shows the query plan, including table scans, index usage, join types, and execution order, which is crucial for query optimization." },
                    { question: "What is a 'Common Table Expression (CTE)' in SQL?", answer: "A CTE is a temporary named result set that you can reference within a `SELECT`, `INSERT`, `UPDATE`, or `DELETE` statement. It improves readability and reusability of complex queries, especially for recursive queries." },
                    { question: "What is 'Database Sharding'?", answer: "Database sharding is a method of horizontal partitioning data across multiple database servers. Each shard (server) holds a subset of the data, allowing for increased scalability and performance by distributing the load." },
                    { question: "Differentiate between 'OLTP' and 'OLAP' systems.", answer: "OLTP (Online Transaction Processing): Designed for processing large numbers of short, online transactions (e.g., banking, e-commerce). OLAP (Online Analytical Processing): Designed for complex queries and analytical processing of large volumes of historical data (e.g., data warehousing, business intelligence)." },
                    { question: "What is a 'Self-Join' in SQL?", answer: "A self-join is a join in which a table is joined with itself. It's used to combine rows with other rows in the same table, often for hierarchical data or comparing rows within the same table." }
                ],
                computer_networks: [
                    { question: "Explain the OSI Model and list its 7 layers.", answer: "The OSI (Open Systems Interconnection) model is a conceptual framework that standardizes the functions of a telecommunication or computing system into seven abstraction layers: Physical, Data Link, Network, Transport, Session, Presentation, Application." },
                    { question: "List the layers of the TCP/IP Model and briefly describe their functions.", answer: "TCP/IP Model has four layers: Network Access (Physical/Data Link), Internet (IP addressing, routing), Transport (TCP/UDP for end-to-end communication), Application (high-level protocols like HTTP, FTP)." },
                    { question: "Differentiate between TCP and UDP.", answer: "TCP (Transmission Control Protocol): Connection-oriented, reliable, ordered, error-checked, flow/congestion control (e.g., HTTP, FTP). UDP (User Datagram Protocol): Connectionless, unreliable, faster, no ordering/error checking (e.g., DNS, streaming)." },
                    { question: "Explain IP addressing (IPv4 vs IPv6).", answer: "IPv4 uses 32-bit addresses (e.g., 192.168.1.1), limited addresses. IPv6 uses 128-bit addresses, vastly more addresses, designed to replace IPv4 due to exhaustion." },
                    { question: "What is DNS (Domain Name System)?", answer: "DNS is a hierarchical and decentralized naming system for computers, services, or any resource connected to the Internet or a private network. It translates human-readable domain names (e.g., google.com) into numerical IP addresses." },
                    { question: "What is the difference between HTTP and HTTPS?", answer: "HTTP (Hypertext Transfer Protocol) is for transmitting hypertext over the internet. HTTPS (HTTP Secure) is the secure version, using SSL/TLS encryption to secure communication between the client and server, protecting data integrity and confidentiality." },
                    { question: "Differentiate between a Router and a Switch.", answer: "Router: Operates at Network layer (Layer 3), connects different networks, forwards packets between them based on IP addresses. Switch: Operates at Data Link layer (Layer 2), connects devices within the same network, forwards frames based on MAC addresses." },
                    { question: "What is a Firewall and its purpose?", answer: "A firewall is a network security system that monitors and controls incoming and outgoing network traffic based on predetermined security rules. Its purpose is to protect a network from unauthorized access and malicious traffic." },
                    { question: "Explain the concept of Subnetting.", answer: "Subnetting is the process of dividing a larger network into smaller, more efficient subnetworks. It improves network performance, security, and helps manage IP address space more effectively." },
                    { question: "What is a 'protocol' in computer networking?", answer: "A protocol is a set of rules and guidelines for communicating data. It defines the format, order, and error handling for messages exchanged between computing devices in a network." },
                    { question: "What is DHCP (Dynamic Host Configuration Protocol)?", answer: "DHCP is a network management protocol used on IP networks for dynamically assigning IP addresses and other communication parameters to devices connected to the network. It automates the IP configuration process." },
                    { question: "What is ARP (Address Resolution Protocol)?", answer: "ARP is a protocol used by the Internet Protocol (IP) to map IP network addresses to the hardware (MAC) addresses used by a data link protocol. It resolves IP addresses to MAC addresses on a local network segment." },
                    { question: "Differentiate between Latency and Bandwidth.", answer: "Latency: The time delay for data to travel from one point to another in a network (measured in milliseconds). Bandwidth: The maximum amount of data that can be transmitted over a network connection in a given amount of time (measured in bits per second)." },
                    { question: "What is a 'proxy server'?", answer: "A proxy server acts as an intermediary for requests from clients seeking resources from other servers. It can be used for security (filtering), performance (caching), or privacy (anonymity)." },
                    { question: "What is 'VPN' (Virtual Private Network)?", answer: "A VPN extends a private network across a public network and enables users to send and receive data across shared or public networks as if their computing devices were directly connected to the private network. It provides security and anonymity." },
                    { question: "Explain how a 'three-way handshake' works in TCP.", answer: "The three-way handshake establishes a TCP connection: 1. Client sends SYN (synchronize) packet. 2. Server sends SYN-ACK (synchronize-acknowledge) packet. 3. Client sends ACK (acknowledge) packet. Connection is then established." },
                    { question: "What is a 'MAC Address' and where does it operate in the OSI model?", answer: "A MAC (Media Access Control) address is a unique hardware identifier assigned to network interfaces. It operates at the Data Link Layer (Layer 2) of the OSI model." },
                    { question: "Differentiate between a 'Hub', 'Switch', and 'Router'.", answer: "Hub: Layer 1 device, broadcasts all traffic. Switch: Layer 2 device, forwards traffic to specific MAC addresses. Router: Layer 3 device, connects different networks, forwards traffic based on IP addresses." },
                    { question: "What is 'NAT' (Network Address Translation)?", answer: "NAT is a method of remapping one IP address space into another by modifying network address information in the IP header of packets while they are in transit across a traffic routing device. It allows multiple devices to share a single public IP address." },
                    { question: "Explain the concept of 'Packet Switching'.", answer: "Packet switching is a method of grouping data into packets that are transmitted independently over a network. Each packet contains addressing information, allowing it to be routed independently to its destination, reassembled upon arrival." },
                    { question: "What is 'Congestion Control' in TCP?", answer: "Congestion control is a mechanism in TCP to prevent a network from becoming overloaded when there is too much traffic. It involves algorithms that dynamically adjust the rate at which data is sent based on network conditions." },
                    { question: "Describe the function of 'DHCP Relay Agent'.", answer: "A DHCP relay agent is used when DHCP clients and servers are on different subnets. It forwards DHCP messages between clients and servers, allowing clients to obtain IP configurations from a server not on their local subnet." },
                    { question: "What is 'Port Forwarding'?", answer: "Port forwarding is a technique that redirects communication requests from one address and port number combination to another while the packets are traversing a network gateway, such as a router or firewall." },
                    { question: "Explain the difference between 'Unicast', 'Broadcast', and 'Multicast' communication.", answer: "Unicast: One-to-one communication. Broadcast: One-to-all communication within a network segment. Multicast: One-to-many communication, where data is sent to a specific group of recipients." },
                    { question: "What is 'Latency' and how does it affect network performance?", answer: "Latency is the time delay for data to travel from one point to another. High latency can lead to slow response times, lag in real-time applications, and poor user experience, even with high bandwidth." },
                    { question: "What is the purpose of 'ICMP' (Internet Control Message Protocol)?", answer: "ICMP is a network layer protocol used by network devices to send error messages and operational information. It's used by utilities like `ping` and `traceroute`." },
                    { question: "Explain 'Routing Protocols' and give an example.", answer: "Routing protocols are used by routers to dynamically learn and exchange routing information, enabling them to determine the best paths for data packets. Examples: RIP (Routing Information Protocol), OSPF (Open Shortest Path First), BGP (Border Gateway Protocol)." },
                    { question: "What is a 'Socket' in network programming?", answer: "A socket is an endpoint of a two-way communication link between two programs running on the network. It provides a mechanism for programs to send and receive data across a network." },
                    { question: "Describe the 'Application Layer' of the OSI/TCP-IP model.", answer: "The Application Layer is the top layer, providing network services directly to end-user applications. It defines protocols for specific applications like HTTP (web browsing), FTP (file transfer), SMTP (email), DNS (domain name resolution)." },
                    { question: "What is the difference between 'Circuit Switching' and 'Packet Switching'?", answer: "Circuit Switching: A dedicated communication path is established between two parties for the duration of the communication (e.g., traditional telephone calls). Packet Switching: Data is broken into packets, each routed independently, sharing network resources (e.g., the Internet)." },
                    { question: "Explain the concept of 'Flow Control' in networking.", answer: "Flow control is a mechanism to manage the rate of data transmission between two nodes to prevent a fast sender from overwhelming a slow receiver. It ensures that the sending device does not transmit more data than the receiving device can process." },
                    { question: "What is 'Error Control' in networking?", answer: "Error control (or error correction) refers to techniques used to detect and correct errors that may occur during data transmission over a network. This includes methods like checksums, cyclic redundancy checks (CRCs), and retransmission of corrupted data." },
                    { question: "Differentiate between 'Bridge' and 'Router'.", answer: "Bridge: Operates at the Data Link Layer (Layer 2), connects two or more LAN segments, forwards frames based on MAC addresses, and can filter traffic. Router: Operates at the Network Layer (Layer 3), connects different networks, forwards packets based on IP addresses." },
                    { question: "What is 'CSMA/CD' and where is it used?", answer: "CSMA/CD (Carrier Sense Multiple Access with Collision Detection) is a media access control method used in Ethernet networks. Devices 'listen' before transmitting (carrier sense) and detect collisions during transmission, then back off and retransmit." },
                    { question: "Explain the concept of 'Network Topology'.", answer: "Network topology refers to the arrangement of the various elements (links, nodes, etc.) of a computer network. Common topologies include Bus, Star, Ring, Mesh, and Tree, each with different characteristics regarding reliability, cost, and performance." },
                    { question: "What is 'Quality of Service (QoS)' in networking?", answer: "QoS refers to the overall performance of a network, particularly the performance seen by users of the network. It involves mechanisms to manage network resources to provide different levels of service to different types of traffic (e.g., prioritizing voice/video over email)." },
                    { question: "Describe the function of 'NAT' (Network Address Translation) in more detail.", answer: "NAT allows multiple devices on a private network to share a single public IP address when connecting to the internet. It translates private IP addresses in outgoing packets to a public IP and vice-versa for incoming packets, conserving IPv4 addresses." },
                    { question: "What is 'VPN Tunneling'?", answer: "VPN tunneling is the process by which data packets are encapsulated within another protocol and sent over an unsecured network. This creates a secure, private 'tunnel' through the public internet, encrypting data and ensuring confidentiality." },
                    { question: "Explain the concept of 'Port Numbers' in TCP/UDP.", answer: "Port numbers are 16-bit numbers (0-65535) used by TCP and UDP to identify specific applications or services running on a host. Well-known ports (0-1023) are reserved for common services (e.g., 80 for HTTP, 443 for HTTPS)." },
                    { question: "What is 'Traceroute' and its purpose?", answer: "Traceroute (or `tracert` on Windows) is a network diagnostic tool used to display the path (route) and measure transit delays of packets across an Internet Protocol (IP) network. It helps identify network bottlenecks or points of failure." }
                ],
                operating_systems: [
                    { question: "What is an Operating System (OS)?", answer: "An OS is system software that manages computer hardware and software resources and provides common services for computer programs. It acts as an intermediary between the user and the computer hardware." },
                    { question: "Differentiate between a Process and a Thread.", answer: "Process: An instance of a computer program being executed. It has its own memory space, resources. Thread: A single sequence of execution within a process. Threads within the same process share memory space and resources, making them lightweight." },
                    { question: "Explain 'Deadlock' in the context of Operating Systems.", answer: "Deadlock is a situation where two or more processes are blocked indefinitely, waiting for each other to release the resources that they need. Conditions for deadlock: Mutual Exclusion, Hold and Wait, No Preemption, Circular Wait." },
                    { question: "What is Memory Management in OS?", answer: "Memory management is the function of an operating system that handles primary memory and moves processes back and forth between main memory and disk during execution. It ensures efficient and secure memory allocation to processes." },
                    { question: "Differentiate between Paging and Segmentation.", answer: "Paging: Divides logical memory into fixed-size blocks (pages) and physical memory into same-size blocks (frames). Segmentation: Divides logical memory into variable-size blocks (segments) based on logical units (e.g., code, data stack)." },
                    { question: "Describe common CPU Scheduling Algorithms.", answer: "Common algorithms: FCFS (First-Come, First-Served), SJF (Shortest Job First), Priority Scheduling, Round Robin, Multilevel Queue Scheduling. They determine which process gets the CPU at what time." },
                    { question: "What is Virtual Memory?", answer: "Virtual memory is a memory management technique that allows a computer to compensate for physical memory shortages by temporarily transferring data from RAM to disk storage. It gives the illusion of a much larger memory space than physically available." },
                    { question: "Differentiate between a Mutex and a Semaphore.", answer: "Mutex (Mutual Exclusion): A locking mechanism used to protect a critical section of code, ensuring only one thread can access it at a time. Semaphore: A signaling mechanism used to control access to a common resource by multiple processes/threads, based on a counter." },
                    { question: "What is 'Thrashing' in OS?", answer: "Thrashing occurs when a computer's virtual memory subsystem is in a constant state of paging, rapidly exchanging data in memory for data on disk. This leads to very high page fault rates and low CPU utilization, as the system spends more time swapping than executing." },
                    { question: "What is a 'Kernel' in an Operating System?", answer: "The Kernel is the core component of an operating system. It manages system resources (CPU, memory, I/O devices), mediates access to hardware, and provides essential services for applications." },
                    { question: "Explain 'Context Switching'.", answer: "Context switching is the process of storing the state (context) of a process or thread so that it can be restored and execution can be resumed later, and then restoring a different process's or thread's state. It allows the CPU to switch between multiple processes/threads." },
                    { question: "What is a File System in OS?", answer: "A file system is a method and data structure that an operating system uses to control how data is stored and retrieved. It organizes files into a hierarchical structure (directories/folders) and manages access to them." },
                    { question: "What are Interrupts in OS?", answer: "Interrupts are signals sent to the CPU that indicate an event has occurred and requires immediate attention. They can be hardware-generated (e.g., I/O completion) or software-generated (e.g., system calls, errors)." },
                    { question: "What are System Calls?", answer: "System calls are the programmatic way in which a computer program requests a service from the kernel of the operating system. They provide an interface between a process and the OS, allowing access to hardware and OS services." },
                    { question: "What is 'bootstrapping' in OS?", answer: "Bootstrapping (or booting) is the process by which a computer starts up. It involves a small program (bootstrap loader) loading the operating system into memory and initiating its execution." },
                    { question: "Explain the concept of 'Process Synchronization'.", answer: "Process synchronization refers to the coordination of multiple processes to ensure that they execute correctly and access shared resources in a controlled manner, preventing race conditions and maintaining data consistency." },
                    { question: "What is a 'Scheduler' in an Operating System?", answer: "A scheduler is a component of the OS that selects which processes from the ready queue should be executed by the CPU. It manages the allocation of CPU time to processes." },
                    { question: "Differentiate between 'Monolithic Kernel' and 'Microkernel'.", answer: "Monolithic Kernel: All OS services (process management, memory management, file system, device drivers) run in a single address space. Microkernel: Only essential services (IPC, basic scheduling, low-level memory management) run in kernel space; other services run as user-space processes." },
                    { question: "What is 'Swapping' in OS?", answer: "Swapping is a memory management technique where a process (or parts of it) can be temporarily moved from main memory to secondary storage (swap space on disk) and then brought back into memory for execution. It allows more processes to run than physically fit in RAM." },
                    { question: "Explain 'Race Condition'.", answer: "A race condition occurs when multiple processes or threads try to access and modify the same shared resource concurrently, and the final outcome depends on the order of execution. This can lead to incorrect or unpredictable results." },
                    { question: "What is 'Segmentation Fault'?", answer: "A segmentation fault (or segfault) is a common error that occurs when a program attempts to access a memory location that it is not allowed to access, or attempts to access a memory location in a way that is not allowed (e.g., writing to a read-only location)." },
                    { question: "Describe the 'Producer-Consumer Problem' and a solution.", answer: "The Producer-Consumer problem is a classic synchronization problem where a producer generates data and puts it into a buffer, and a consumer takes data from the buffer. Solutions involve using semaphores or mutexes to ensure safe access to the shared buffer and prevent overflow/underflow." },
                    { question: "What is 'DMA' (Direct Memory Access) and its purpose?", answer: "DMA is a feature of computer systems that allows certain hardware subsystems (e.g., disk drive controllers, network interface cards) to access main system memory (RAM) independently of the central processing unit (CPU). It improves system performance by offloading data transfer tasks from the CPU." },
                    { question: "Explain the concept of 'Time-Sharing' operating systems.", answer: "Time-sharing OS allows multiple users to share a computer simultaneously. The CPU time is divided into small slices, and each user/process is given a time slice to execute. This gives the illusion that each user has the entire computer to themselves." },
                    { question: "What is a 'Bootloader'?", answer: "A bootloader is a small program that resides in the boot sector of a hard drive or other bootable device. Its primary function is to load the operating system kernel into memory and initiate its execution when the computer powers on." },
                    { question: "What is a 'System Call Interface'?", answer: "The system call interface is the layer between the operating system kernel and user applications. It provides a standardized set of functions that applications can use to request services from the OS kernel." },
                    { question: "Explain the purpose of 'Device Drivers'.", answer: "Device drivers are software components that allow the operating system to communicate with hardware devices. They provide an abstraction layer, translating generic OS commands into specific instructions that a particular hardware device can understand." },
                    { question: "What is 'Inter-Process Communication (IPC)'?", answer: "IPC refers to mechanisms provided by the operating system that allow different processes to communicate with each other and synchronize their actions. Common IPC methods include pipes, message queues, shared memory, and semaphores." },
                    { question: "Differentiate between 'User Mode' and 'Kernel Mode'.", answer: "User Mode: The CPU executes user applications; restricted access to hardware and privileged instructions. Kernel Mode: The CPU executes OS kernel code; full access to hardware and all instructions. A system call transitions from user to kernel mode." },
                    { question: "What is 'Disk Scheduling'?", answer: "Disk scheduling is the method that operating systems use to decide the order in which disk I/O requests are serviced. Algorithms like FCFS, SSTF, SCAN, C-SCAN aim to minimize disk head movement and improve access time." },
                    { question: "Explain 'Demand Paging'.", answer: "Demand paging is a virtual memory technique where pages are loaded into main memory only when they are needed (on demand) during program execution, rather than loading an entire process at once. This reduces memory usage and improves system responsiveness." },
                    { question: "What is a 'File Descriptor'?", answer: "A file descriptor is an abstract indicator (handle) used to access a file or other input/output resource, such as a pipe or network socket. It's an integer that uniquely identifies an open file within a process." },
                    { question: "Differentiate between 'Preemptive' and 'Non-Preemptive' scheduling.", answer: "Preemptive scheduling: The CPU can be taken away from a running process and allocated to another process (e.g., Round Robin, Priority with preemption). Non-Preemptive scheduling: Once a process gets the CPU, it holds it until it completes or voluntarily yields (e.g., FCFS, SJF without preemption)." },
                    { question: "What is the 'Dining Philosophers Problem'?", answer: "The Dining Philosophers Problem is a classic synchronization problem used to illustrate concurrency control issues. It describes five philosophers sitting around a table, alternately thinking and eating, needing two forks (shared resources) to eat, which can lead to deadlock." },
                    { question: "Explain the concept of 'Symmetric Multiprocessing (SMP)'.", answer: "SMP is a multiprocessing system where two or more identical processors are connected to a single shared main memory and controlled by a single operating system instance. All processors can access all memory and I/O devices, and they share a common bus." }
                ],
                computer_organization_architecture: [
                    { question: "List and explain the main components of a CPU.", answer: "Main components: ALU (Arithmetic Logic Unit - performs arithmetic/logical operations), Control Unit (manages/coordinates components), Registers (small, fast storage for data/instructions), Cache (fast memory for frequently accessed data)." },
                    { question: "Explain the concept of Memory Hierarchy.", answer: "Memory hierarchy is a system that arranges computer storage into a hierarchy based on response time (speed) and cost. Faster, smaller, and more expensive memory (registers, cache) is at the top, while slower, larger, cheaper memory (main memory, secondary storage) is at the bottom." },
                    { question: "What is Cache Memory, and why is it used?", answer: "Cache memory is a small, very fast memory located close to the CPU. It stores copies of data from frequently used main memory locations. It's used to reduce the average time to access data from main memory, speeding up CPU operations." },
                    { question: "What are Registers in a CPU?", answer: "Registers are small, high-speed storage locations directly within the CPU. They hold data that the CPU is currently processing or will process very soon, such as operands, instructions, and memory addresses." },
                    { question: "Explain 'Pipelining' in CPU architecture.", answer: "Pipelining is a technique where multiple instructions are overlapped in execution. While one instruction is in the 'execute' stage, another can be in 'decode', and a third in 'fetch', improving CPU throughput." },
                    { question: "What is an Instruction Set Architecture (ISA)?", answer: "ISA is the part of the computer architecture related to programming, including the native data types, instructions, registers, addressing modes, memory architecture, interrupt, and exception handling. It's the interface between hardware and software." },
                    { question: "Differentiate between RISC and CISC architectures.", answer: "RISC (Reduced Instruction Set Computer): Fewer, simpler, fixed-length instructions, executed quickly (e.g., ARM). CISC (Complex Instruction Set Computer): More, complex, variable-length instructions, can perform multiple operations per instruction (e.g., x86)." },
                    { question: "Explain the difference between Von Neumann and Harvard Architectures.", answer: "Von Neumann: Uses a single address space for both instructions and data, sharing a single bus (simpler design, potential bottleneck). Harvard: Uses separate memory spaces and buses for instructions and data (allows simultaneous access, faster, more complex)." },
                    { question: "What are Interrupts in COA?", answer: "In COA, interrupts are hardware or software signals that cause the CPU to temporarily suspend its current execution and jump to an Interrupt Service Routine (ISR) to handle the event. They allow the CPU to respond to external events or errors." },
                    { question: "What is a 'Bus' in computer architecture?", answer: "A bus is a communication system that transfers data between components inside a computer or between computers. It consists of a set of parallel electrical conductors (wires) and associated control logic." },
                    { question: "What is the function of the ALU (Arithmetic Logic Unit)?", answer: "The ALU is a digital circuit within the CPU that performs arithmetic operations (addition, subtraction, etc.) and logical operations (AND, OR, NOT, XOR) on binary numbers." },
