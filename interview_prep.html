                    { question: "What is the role of the Control Unit in a CPU?", answer: "The Control Unit (CU) is a component of the CPU that directs the operation of the processor. It interprets instructions and generates control signals to coordinate the flow of data within the CPU and between the CPU and other components." },
                    { question: "What is 'Clock Speed' in a CPU?", answer: "Clock speed (or clock rate) measures the number of cycles a CPU can execute per second, expressed in gigahertz (GHz). A higher clock speed generally means faster processing, though other factors like architecture also play a role." },
                    { question: "What is 'firmware'?", answer: "Firmware is a specific class of computer software that provides low-level control for a device's specific hardware. It's often stored in non-volatile memory (like ROM, EPROM, flash memory) and provides the basic instructions for hardware operation." },
                    { question: "What is 'microcode' in CPU architecture?", answer: "Microcode is a layer of software (firmware) that translates complex machine language instructions into simpler, low-level operations (micro-operations) that the CPU's hardware can directly execute. It provides flexibility in implementing and modifying instruction sets." },
                    { question: "Explain the concept of 'Cache Coherence'.", answer: "Cache coherence ensures that all copies of a shared memory location in different caches (and main memory) have the same value. It's crucial in multi-processor systems to maintain data consistency." },
                    { question: "What are 'Addressing Modes' in CPU architecture?", answer: "Addressing modes specify how the operand of an instruction is located. Common modes include immediate (operand is part of instruction), direct (address is in instruction), indirect (address of address is in instruction), register (operand in register), indexed, etc." },
                    { question: "Differentiate between 'Hardwired Control' and 'Microprogrammed Control' units.", answer: "Hardwired Control: Implemented using fixed logic circuits, faster but complex to design and modify. Microprogrammed Control: Uses a microprogram (sequence of micro-instructions) stored in control memory, slower but more flexible and easier to modify." },
                    { question: "What is 'DMA' (Direct Memory Access) in COA?", answer: "DMA is a hardware feature that allows I/O devices to access main memory directly, without involving the CPU. This improves system performance by offloading data transfer tasks from the CPU, allowing the CPU to perform other operations concurrently." },
                    { question: "Explain the concept of 'Instruction Pipelining Hazards'.", answer: "Pipelining hazards are situations that prevent the next instruction in the instruction stream from executing in its designated clock cycle. Types: Structural (resource conflict), Data (data dependency), Control (branching)." },
                    { question: "What is the purpose of 'Memory-Mapped I/O'?", answer: "Memory-mapped I/O is a technique where hardware devices are mapped into the CPU's address space. The CPU can then interact with these devices by reading from or writing to specific memory addresses, simplifying I/O operations." },
                    { question: "Differentiate between 'Volatile' and 'Non-Volatile' memory.", answer: "Volatile memory (e.g., RAM): Requires power to maintain the stored information; data is lost when power is off. Non-Volatile memory (e.g., ROM, Flash, SSD): Retains stored information even when not powered." },
                    { question: "What is 'RISC-V' architecture?", answer: "RISC-V is an open-source instruction set architecture (ISA) based on RISC principles. It's designed to be modular, extensible, and free to use, promoting innovation in processor design." },
                    { question: "Explain the concept of 'Interrupt Service Routine (ISR)'.", answer: "An ISR (also known as an interrupt handler) is a software routine that a processor executes when it receives an interrupt. It saves the current state, handles the interrupt, and then restores the state to resume normal execution." },
                    { question: "What is the role of the 'Program Counter' (PC) register?", answer: "The Program Counter (PC) is a CPU register that holds the memory address of the next instruction to be fetched from memory. It is automatically incremented after each instruction fetch." },
                    { question: "What is 'Microarchitecture' vs. 'Architecture'?", answer: "Architecture (ISA): The programmer's view of the computer (instruction set, registers, memory model). Microarchitecture: The specific implementation of the architecture, detailing how the components are organized and interconnected to execute instructions." },
                    { question: "Explain the concept of 'Locality of Reference' and its importance for cache.", answer: "Locality of Reference states that programs tend to reuse data and instructions that they have used recently (temporal locality) or that are near recently used data/instructions (spatial locality). This principle is why cache memory is effective, as it stores these frequently accessed items close to the CPU." },
                    { question: "What is a 'Multicore Processor'?", answer: "A multicore processor is a single computing component with two or more independent actual processing units (cores), which are units that read and execute program instructions. This allows the processor to run multiple instructions simultaneously, enhancing overall performance." },
                    { question: "Differentiate between 'SRAM' and 'DRAM'.", answer: "SRAM (Static RAM): Faster, more expensive, uses latches to store data, doesn't need refreshing. Used for cache memory. DRAM (Dynamic RAM): Slower, cheaper, uses capacitors to store data, needs periodic refreshing. Used for main memory (RAM)." },
                    { question: "What is 'Bus Arbitration'?", answer: "Bus arbitration is the process by which a bus master (e.g., CPU, DMA controller) gains control of the system bus to transfer data. It's necessary in multi-master systems to prevent conflicts and ensure orderly access to shared resources." },
                    { question: "Explain 'Instruction Level Parallelism (ILP)'.", answer: "ILP is a measure of how many operations in a computer program can be executed simultaneously. Techniques like pipelining and superscalar execution are used to exploit ILP and improve CPU performance." },
                    { question: "What is the 'Fetch-Decode-Execute Cycle'?", answer: "The Fetch-Decode-Execute Cycle (or Instruction Cycle) is the basic operation cycle of a computer. It's the process by which a computer retrieves a program instruction from its memory, determines what actions the instruction requires, and carries out those actions." },
                    { question: "Differentiate between 'Memory Access Time' and 'Cycle Time'.", answer: "Memory Access Time: The time required to complete one read or write operation. Cycle Time: The minimum time delay required between the initiation of two successive memory operations. Cycle time is typically longer than access time." },
                    { question: "What is a 'Floating-Point Unit (FPU)'?", answer: "An FPU is a part of a computer system specially designed to carry out operations on floating-point numbers. It handles mathematical operations that involve real numbers, which are crucial for scientific and graphical applications." },
                    { question: "Explain 'Amdahl's Law'.", answer: "Amdahl's Law is a formula that gives the theoretical speedup in latency of execution of a task at fixed workload that can be expected of a system whose resources are improved. It highlights the limits of parallelization due to the sequential portion of a program." }
                ]
            }
        };

        const appContent = document.getElementById('app-content');
        const navLinks = document.getElementById('nav-links');

        // --- Navigation Functions ---
        function navigateTo(page, skill = null) {
            // Removed window.history.pushState to avoid SecurityError in iframe environments
            renderPage(page, skill);
        }

        function renderHomePage() {
            appContent.innerHTML = `
                <div class="text-center py-12">
                    <h2 class="text-4xl font-bold text-gray-800 mb-8">Welcome to Your Interview Prep Hub!</h2>
                    <p class="text-lg text-gray-600 mb-10">Select a preparation area to get started.</p>
                    <div class="flex flex-col sm:flex-row justify-center space-y-6 sm:space-y-0 sm:space-x-6">
                        <button onclick="navigateTo('hr')" class="btn btn-primary text-xl px-8 py-4">HR Interview Prep</button>
                        <button onclick="navigateTo('technical')" class="btn btn-primary text-xl px-8 py-4">Technical Interview Prep</button>
                    </div>
                </div>
            `;
            navLinks.innerHTML = ''; // No nav links on home
        }

        function renderHrPage() {
            navLinks.innerHTML = `<button onclick="navigateTo('home')" class="btn btn-secondary">Home</button>`;
            appContent.innerHTML = `
                <h2 class="text-3xl font-bold text-gray-800 mb-6 text-center">HR Interview Questions</h2>
                <div class="space-y-4">
                    ${interviewData.hr.map((item, index) => `
                        <div class="accordion-item card">
                            <div class="accordion-header" onclick="toggleAccordion(this)">
                                <span>${index + 1}. ${item.question}</span>
                                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
                            </div>
                            <div class="accordion-content">
                                <p class="text-gray-700 whitespace-pre-line">${item.answer}</p>
                            </div>
                        </div>
                    `).join('')}
                </div>
            `;
        }

        function renderTechnicalPage() {
            navLinks.innerHTML = `<button onclick="navigateTo('home')" class="btn btn-secondary">Home</button>`;
            appContent.innerHTML = `
                <h2 class="text-3xl font-bold text-gray-800 mb-6 text-center">Technical Interview Domains</h2>
                <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6">
                    ${Object.keys(interviewData.technical).map(skillKey => `
                        <div class="card cursor-pointer flex flex-col justify-between" onclick="navigateTo('skill_detail', '${skillKey}')">
                            <h3 class="text-xl font-semibold text-gray-800 mb-2">${formatSkillName(skillKey)}</h3>
                            <p class="text-gray-600 text-sm">Explore ${interviewData.technical[skillKey].length} common interview questions.</p>
                            <div class="mt-4 text-right">
                                <span class="text-gray-500 font-medium hover:underline">View Questions &rarr;</span>
                            </div>
                        </div>
                    `).join('')}
                </div>
            `;
        }

        function renderSkillDetailPage(skillKey) {
            const skillData = interviewData.technical[skillKey];
            if (!skillData) {
                appContent.innerHTML = `<p class="text-gray-700 text-center">Skill not found!</p>`;
                return;
            }

            navLinks.innerHTML = `<button onclick="navigateTo('technical')" class="btn btn-secondary mr-4">Back to Technical Domains</button>`;
            appContent.innerHTML = `
                <h2 class="text-3xl font-bold text-gray-800 mb-6 text-center">${formatSkillName(skillKey)} Interview Questions</h2>
                <div class="space-y-4">
                    ${skillData.map((item, index) => `
                        <div class="accordion-item card">
                            <div class="accordion-header" onclick="toggleAccordion(this)">
                                <span>${index + 1}. ${item.question}</span>
                                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
                            </div>
                            <div class="accordion-content">
                                <p class="text-gray-700 whitespace-pre-line">${item.answer}</p>
                            </div>
                        </div>
                    `).join('')}
                </div>
            `;
        }

        function formatSkillName(key) {
            const parts = key.split('_');
            if (key === 'ai_ml_dl') return 'AI/ML/DL';
            if (key === 'oops') return 'OOPs';
            if (key === 'rdbms') return 'RDBMS';
            if (key === 'computer_networks') return 'Computer Networks';
            if (key === 'operating_systems') return 'Operating Systems';
            if (key === 'computer_organization_architecture') return 'Computer Organization Architecture';

            return parts.map(word => word.charAt(0).toUpperCase() + word.slice(1)).join(' ');
        }

        function toggleAccordion(headerElement) {
            const item = headerElement.closest('.accordion-item');
            item.classList.toggle('active');
        }

        // --- Routing Logic ---
        function getInitialPageState() {
            // For Canvas preview, always start at home.
            return {
                page: 'home',
                skill: null
            };
        }

        function renderPage(page, skill) {
            switch (page) {
                case 'home':
                    renderHomePage();
                    break;
                case 'hr':
                    renderHrPage();
                    break;
                case 'technical':
                    renderTechnicalPage();
                    break;
                case 'skill_detail':
                    renderSkillDetailPage(skill);
                    break;
                default:
                    renderHomePage();
            }
        }

        // Initial page load
        window.addEventListener('load', () => {
            const { page, skill } = getInitialPageState(); // Use simplified initial state
            renderPage(page, skill);
        });

        // Removed window.addEventListener('popstate') as history.pushState is no longer used.
    </script>
</body>
</html>
