<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DSA Preparation App</title>
    <!-- Tailwind CSS CDN for styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Setting the default font and background color */
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f3f4f6; /* Light gray background */
        }
        /* Custom styles for the collapsible sections */
        .collapsible-content {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.3s ease-out, padding 0.3s ease-out;
            padding: 0 1.5rem; /* Add horizontal padding, but no vertical padding initially */
        }
        .collapsible-content.expanded {
            max-height: 1000px; /* A large value to ensure content fits */
            padding: 1.5rem; /* Add vertical padding when expanded */
        }
        .collapsible-header svg {
            transition: transform 0.3s ease;
        }
        .collapsible-header.expanded svg {
            transform: rotate(180deg);
        }
    </style>
</head>
<body class="bg-gray-100 dark:bg-gray-900 text-gray-900 dark:text-gray-100 p-4">

    <div class="max-w-4xl mx-auto bg-white dark:bg-gray-800 rounded-xl shadow-lg p-6 sm:p-8">
        <h1 class="text-3xl sm:text-4xl font-bold text-center mb-6 text-gray-900 dark:text-white">
            Interview Prep: DSA Concepts
        </h1>

        <p class="text-center text-lg sm:text-xl text-gray-600 dark:text-gray-300 mb-8">
            Click on a category to explore key algorithms and interview questions.
        </p>

        <div id="dsa-container" class="space-y-4">
            <!-- DSA concepts will be dynamically added here by JavaScript -->
        </div>
    </div>

    <script>
        // Data structure containing all the DSA concepts
        const dsaConcepts = [
            {
                title: 'Linear DSA: Arrays',
                summary: 'Arrays are collections of items stored at contiguous memory locations. The main advantage is constant-time access to any element by its index.',
                algorithms: [
                    { name: 'Searching', description: 'Linear Search ($O(n)$), Binary Search ($O(\log n)$).' },
                    { name: 'Sorting', description: 'Bubble Sort, Selection Sort, Insertion Sort ($O(n^2)$), Merge Sort, Quick Sort ($O(n \log n)$).' },
                ],
                questions: [
                    'Given a sorted array of distinct integers and a target value, return the index if the target is found. If not, return the index where it would be if it were inserted in order.',
                    'Find the maximum and minimum elements in an array.',
                    'Given an array of integers, find the contiguous subarray with the largest sum.',
                ],
                example: {
                    title: 'Binary Search Example',
                    description: 'Binary search is an efficient algorithm for finding an item from a sorted list of items. It works by repeatedly dividing the search interval in half. The key is its logarithmic time complexity, $O(\log n)$, which makes it much faster than linear search for large datasets.',
                    code: 'function binarySearch(arr, target) {\n  let left = 0;\n  let right = arr.length - 1;\n\n  while (left <= right) {\n    const mid = Math.floor((left + right) / 2);\n    if (arr[mid] === target) {\n      return mid;\n    } else if (arr[mid] < target) {\n      left = mid + 1;\n    } else {\n      right = mid - 1;\n    }\n  }\n  return -1;\n}'
                }
            },
            {
                title: 'Linear DSA: Strings',
                summary: 'Strings are sequences of characters. Many array-based algorithms and techniques can be applied to strings.',
                algorithms: [
                    { name: 'Pattern Matching', description: 'Naive String Matching, Knuth-Morris-Pratt (KMP) Algorithm.' },
                    { name: 'Hashing', description: 'Rabin-Karp Algorithm.' },
                ],
                questions: [
                    'Check if a given string is a palindrome.',
                    'Find the first non-repeating character in a string.',
                    'Given two strings, check if one is an anagram of the other.',
                ],
                example: null // No specific example for this section
            },
            {
                title: 'Linear DSA: Two Pointers',
                summary: 'A Two Pointers algorithm uses two pointers to traverse a data structure, often from opposite ends or at different speeds.',
                algorithms: [
                    { name: 'In-place sorting/reversal', description: 'Swapping elements using two pointers.' },
                    { name: 'Finding pairs in a sorted array', description: 'Finding two elements that sum to a target value.' },
                ],
                questions: [
                    'Reverse a string in-place.',
                    'Given a sorted array, remove duplicates in-place such that each element appears only once.',
                    "Find if there's a pair in a sorted array that sums to a specific value.",
                ],
                example: {
                    title: 'Two Pointers Example: Finding a pair with a given sum',
                    description: 'This example shows how two pointers can efficiently find a pair of numbers in a sorted array that sum up to a target value. By starting from opposite ends and moving the pointers inwards, we can achieve an $O(n)$ time complexity, which is much better than the brute-force $O(n^2)$ approach.',
                    code: 'function findPairWithSum(arr, target) {\n  let left = 0;\n  let right = arr.length - 1;\n\n  while (left < right) {\n    const sum = arr[left] + arr[right];\n    if (sum === target) {\n      return [arr[left], arr[right]];\n    } else if (sum < target) {\n      left++;\n    } else {\n      right--;\n    }\n  }\n  return null;\n}'
                }
            },
            {
                title: 'Linear DSA: Sliding Windows',
                summary: 'This technique is used on linear data structures (like arrays or strings) to solve problems that require a fixed-size or variable-size "window" to be moved over the data.',
                algorithms: [
                    { name: 'Maximum/Minimum Subarray Sum', description: 'Find the subarray with the largest sum using a sliding window.' },
                    { name: 'Substring Problems', description: 'Finding the longest substring with unique characters, or minimum window substring.' },
                ],
                questions: [
                    'Find the length of the longest substring without repeating characters.',
                    'Given an array of positive numbers and a positive number $S$, find the length of the smallest contiguous subarray whose sum is greater than or equal to $S$.',
                ],
                example: null
            },
            {
                title: 'Linear DSA: Queues, Stacks, and Linked Lists',
                summary: 'These are fundamental linear data structures with specific rules for adding and removing elements.',
                algorithms: [
                    { name: 'Queues (FIFO)', description: 'Operations: `enqueue`, `dequeue`. Applications: BFS, task scheduling.' },
                    { name: 'Stacks (LIFO)', description: 'Operations: `push`, `pop`. Applications: DFS, function call stack.' },
                    { name: 'Linked Lists', description: 'Singly Linked List, Doubly Linked List.' },
                ],
                questions: [
                    'Implement a queue using two stacks.',
                    'Validate balanced parentheses using a stack.',
                    'Reverse a singly linked list.',
                    'Detect a cycle in a linked list.',
                ],
                example: null
            },
            {
                title: 'Non-Linear DSA: Trees',
                summary: 'Hierarchical data structures with a root node and child nodes.',
                algorithms: [
                    { name: 'Tree Traversal', description: 'In-order, Pre-order, Post-order (DFS), Level-order (BFS).' },
                    { name: 'Binary Search Tree (BST) Operations', description: 'Insertion, Deletion, Searching.' },
                ],
                questions: [
                    'Implement tree traversals iteratively and recursively.',
                    'Given the root of a binary tree, invert the tree.',
                    'Find the lowest common ancestor of two nodes in a BST.',
                ],
                example: null
            },
            {
                title: 'Non-Linear DSA: Graphs',
                summary: 'A collection of nodes (vertices) and edges that connect them. Graphs can be directed or undirected, weighted or unweighted.',
                algorithms: [
                    { name: 'Graph Traversal', description: 'Breadth-First Search (BFS), Depth-First Search (DFS).' },
                    { name: 'Shortest Path Algorithms', description: 'Dijkstra\'s Algorithm, Bellman-Ford Algorithm.' },
                ],
                questions: [
                    'Given a graph, determine if it contains a cycle.',
                    'Find all connected components in a graph.',
                    'Implement BFS and DFS for a graph.',
                ],
                example: null
            },
            {
                title: 'Non-Linear DSA: Tries (Prefix Trees)',
                summary: 'A specialized tree-like data structure used to store strings, where each node represents a prefix.',
                algorithms: [
                    { name: 'Insertion and Deletion', description: 'Adding or removing a string from the trie.' },
                    { name: 'Searching', description: 'Checking if a string or a prefix exists in the trie.' },
                ],
                questions: [
                    'Implement a trie data structure.',
                    'Find all words in a dictionary that match a given prefix.',
                    'Given a list of words, find the longest common prefix.',
                ],
                example: null
            },
        ];

        // Function to create a list item for an algorithm or question
        const createListItem = (text, isAlgorithm = false) => {
            const li = document.createElement('li');
            li.className = 'text-gray-700 dark:text-gray-200';
            if (isAlgorithm) {
                const nameSpan = document.createElement('span');
                nameSpan.className = 'font-semibold';
                nameSpan.textContent = text.name + ':';
                li.appendChild(nameSpan);
                li.appendChild(document.createTextNode(` ${text.description}`));
            } else {
                li.textContent = text;
            }
            return li;
        };

        // Function to render all the DSA sections
        const renderDSASections = () => {
            const container = document.getElementById('dsa-container');
            container.innerHTML = ''; // Clear existing content
            dsaConcepts.forEach((category) => {
                const categoryDiv = document.createElement('div');
                categoryDiv.className = 'bg-gray-50 dark:bg-gray-700 rounded-lg shadow-md overflow-hidden transition-all duration-300 hover:shadow-xl';

                const button = document.createElement('button');
                button.className = 'collapsible-header w-full text-left p-4 sm:p-6 flex justify-between items-center focus:outline-none';
                button.innerHTML = `
                    <h2 class="text-xl sm:text-2xl font-semibold text-gray-800 dark:text-white">
                        ${category.title}
                    </h2>
                    <svg class="w-6 h-6 text-gray-500 dark:text-gray-300" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path>
                    </svg>
                `;

                const contentDiv = document.createElement('div');
                contentDiv.className = 'collapsible-content bg-white dark:bg-gray-800 border-t border-gray-200 dark:border-gray-700';

                // Summary
                const summaryP = document.createElement('p');
                summaryP.className = 'text-base text-gray-600 dark:text-gray-300 mb-4';
                summaryP.textContent = category.summary;
                contentDiv.appendChild(summaryP);

                // Algorithms section
                if (category.algorithms && category.algorithms.length > 0) {
                    const algorithmsDiv = document.createElement('div');
                    algorithmsDiv.className = 'mb-4';
                    const h3Algo = document.createElement('h3');
                    h3Algo.className = 'text-lg font-bold mb-2';
                    h3Algo.textContent = 'Key Algorithms:';
                    const ulAlgo = document.createElement('ul');
                    ulAlgo.className = 'list-disc list-inside space-y-1 pl-4';
                    category.algorithms.forEach(algo => ulAlgo.appendChild(createListItem(algo, true)));
                    algorithmsDiv.appendChild(h3Algo);
                    algorithmsDiv.appendChild(ulAlgo);
                    contentDiv.appendChild(algorithmsDiv);
                }

                // Questions section
                if (category.questions && category.questions.length > 0) {
                    const questionsDiv = document.createElement('div');
                    const h3Ques = document.createElement('h3');
                    h3Ques.className = 'text-lg font-bold mb-2';
                    h3Ques.textContent = 'Example Interview Questions:';
                    const ulQues = document.createElement('ul');
                    ulQues.className = 'list-decimal list-inside space-y-1 pl-4';
                    category.questions.forEach(question => ulQues.appendChild(createListItem(question)));
                    questionsDiv.appendChild(h3Ques);
                    questionsDiv.appendChild(ulQues);
                    contentDiv.appendChild(questionsDiv);
                }

                // Example section (if available)
                if (category.example) {
                    const exampleDiv = document.createElement('div');
                    exampleDiv.className = 'mt-4 pt-4 border-t border-gray-200 dark:border-gray-700';
                    const h3Example = document.createElement('h3');
                    h3Example.className = 'text-lg font-bold mb-2';
                    h3Example.textContent = `Example: ${category.example.title}`;
                    const pExample = document.createElement('p');
                    pExample.className = 'text-base text-gray-600 dark:text-gray-300 mb-2';
                    pExample.textContent = category.example.description;
                    const pre = document.createElement('pre');
                    pre.className = 'bg-gray-100 dark:bg-gray-900 rounded-lg p-4 text-sm overflow-x-auto';
                    const code = document.createElement('code');
                    code.textContent = category.example.code;
                    pre.appendChild(code);
                    exampleDiv.appendChild(h3Example);
                    exampleDiv.appendChild(pExample);
                    exampleDiv.appendChild(pre);
                    contentDiv.appendChild(exampleDiv);
                }

                categoryDiv.appendChild(button);
                categoryDiv.appendChild(contentDiv);
                container.appendChild(categoryDiv);

                // Add click event listener to the button
                button.addEventListener('click', () => {
                    const isExpanded = button.classList.contains('expanded');
                    document.querySelectorAll('.collapsible-header').forEach(header => {
                        header.classList.remove('expanded');
                    });
                    document.querySelectorAll('.collapsible-content').forEach(content => {
                        content.classList.remove('expanded');
                    });
                    if (!isExpanded) {
                        button.classList.add('expanded');
                        contentDiv.classList.add('expanded');
                    }
                });
            });
        };

        // Render the sections on window load
        window.onload = renderDSASections;
    </script>
</body>
</html>
