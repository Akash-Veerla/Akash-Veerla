<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chess</title>
    <link rel="stylesheet" href="../style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        .chess-container { text-align: center; }
        .chess-board {
            display: grid;
            grid-template-columns: repeat(8, 1fr);
            width: 560px;
            height: 560px;
            margin: 2rem auto;
            border: 5px solid #6A4C2F;
        }
        .chess-square {
            width: 70px;
            height: 70px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 3rem;
        }
        .chess-square.light { background-color: #F0D9B5; }
        .chess-square.dark { background-color: #B58863; }
        .chess-piece { cursor: pointer; }
        .selected { background-color: #6C9B6C !important; }
        .valid-move { background-color: #A8D8A8 !important; }
    </style>
</head>
<body>

    <nav class="navbar">
        <div class="container">
            <a href="../index.html" class="nav-logo">AKASH</a>
            <ul class="nav-menu">
                <li class="nav-item"><a href="../index.html#experience" class="nav-link">Experience</a></li>
                <li class="nav-item"><a href="../index.html#certifications" class="nav-link">Certifications</a></li>
                <li class="nav-item"><a href="../index.html#skills" class="nav-link">Skills</a></li>
                <li class="nav-item"><a href="../index.html#education" class="nav-link">Education</a></li>
                <li class="nav-item"><a href="interview_prep.html" class="nav-link">Interview Prep</a></li>
                <li class="nav-item"><a href="DSA.html" class="nav-link">DSA</a></li>
                <li class="nav-item"><a href="games.html" class="nav-link">Games</a></li>
            </ul>
            <button class="theme-toggle" id="theme-toggle">
                <i class="fas fa-moon"></i>
            </button>
        </div>
    </nav>

    <main class="container chess-container">
        <h2>Chess</h2>
        <div class="chess-board" id="chess-board"></div>
        <div class="game-status" id="game-status">White's Turn</div>
    </main>

    <footer>
        <p>&copy; 2024 AKASH. All rights reserved.</p>
    </footer>

    <script src="../script.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const boardElement = document.getElementById('chess-board');
            const statusElement = document.getElementById('game-status');

            let board = [];
            let selectedPiece = null;
            let turn = 'white';

            const pieces = {
                'r': '♜', 'n': '♞', 'b': '♝', 'q': '♛', 'k': '♚', 'p': '♟',
                'R': '♖', 'N': '♘', 'B': '♗', 'Q': '♕', 'K': '♔', 'P': '♙'
            };

            function initializeBoard() {
                board = [
                    ['r', 'n', 'b', 'q', 'k', 'b', 'n', 'r'],
                    ['p', 'p', 'p', 'p', 'p', 'p', 'p', 'p'],
                    ['', '', '', '', '', '', '', ''],
                    ['', '', '', '', '', '', '', ''],
                    ['', '', '', '', '', '', '', ''],
                    ['', '', '', '', '', '', '', ''],
                    ['P', 'P', 'P', 'P', 'P', 'P', 'P', 'P'],
                    ['R', 'N', 'B', 'Q', 'K', 'B', 'N', 'R']
                ];
                renderBoard();
            }

            function renderBoard() {
                boardElement.innerHTML = '';
                for (let r = 0; r < 8; r++) {
                    for (let c = 0; c < 8; c++) {
                        const square = document.createElement('div');
                        square.className = `chess-square ${(r + c) % 2 === 0 ? 'light' : 'dark'}`;
                        square.dataset.row = r;
                        square.dataset.col = c;

                        const pieceChar = board[r][c];
                        if (pieceChar) {
                            const pieceElement = document.createElement('span');
                            pieceElement.className = 'chess-piece';
                            pieceElement.textContent = pieces[pieceChar];
                            pieceElement.style.color = pieceChar === pieceChar.toUpperCase() ? 'white' : 'black';
                            square.appendChild(pieceElement);
                        }

                        square.addEventListener('click', onSquareClick);
                        boardElement.appendChild(square);
                    }
                }
            }

            function onSquareClick(e) {
                const square = e.currentTarget;
                const row = parseInt(square.dataset.row);
                const col = parseInt(square.dataset.col);
                const piece = board[row][col];

                if (selectedPiece) {
                    // move piece
                    movePiece(selectedPiece.row, selectedPiece.col, row, col);
                    selectedPiece = null;
                    clearHighlights();
                } else if (piece) {
                    // select piece
                    if ((turn === 'white' && piece === piece.toUpperCase()) || (turn === 'black' && piece === piece.toLowerCase())) {
                        selectedPiece = { piece, row, col };
                        highlightSquare(row, col);
                        // showValidMoves(row, col); // to be implemented
                    }
                }
            }

            function movePiece(fromRow, fromCol, toRow, toCol) {
                const piece = board[fromRow][fromCol];
                // Basic move validation (very simplified)
                if (isValidMove(piece, fromRow, fromCol, toRow, toCol)) {
                    board[toRow][toCol] = piece;
                    board[fromRow][fromCol] = '';
                    renderBoard();

                    turn = turn === 'white' ? 'black' : 'white';
                    statusElement.textContent = `${turn.charAt(0).toUpperCase() + turn.slice(1)}'s Turn`;

                    // Check for check/checkmate (to be implemented)
                }
            }

            function isValidMove(piece, fromRow, fromCol, toRow, toCol) {
                // This is a placeholder for the complex chess logic.
                // A full implementation would require rules for each piece.
                return true;
            }

            function highlightSquare(row, col) {
                clearHighlights();
                const square = boardElement.querySelector(`[data-row='${row}'][data-col='${col}']`);
                square.classList.add('selected');
            }

            function clearHighlights() {
                document.querySelectorAll('.selected').forEach(s => s.classList.remove('selected'));
                document.querySelectorAll('.valid-move').forEach(s => s.classList.remove('valid-move'));
            }

            initializeBoard();
        });
    </script>
</body>
</html>
