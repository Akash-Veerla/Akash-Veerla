    <script src="../script.js"></script>
    <script>
        const dsaData = [
            {
                topic: 'Arrays',
                summary: 'A fundamental data structure consisting of a collection of elements, each identified by at least one array index or key.',
                questions: [
                    'Find the missing number in an array of integers from 1 to 100.',
                    'Find the duplicate number in an array of integers.',
                    'Rotate an array to the right by k steps.'
                ],
                code: `// Example: Two Sum Problem
function twoSum(nums, target) {
    const map = new Map();
    for (let i = 0; i < nums.length; i++) {
        const complement = target - nums[i];
        if (map.has(complement)) {
            return [map.get(complement), i];
        }
        map.set(nums[i], i);
    }
}`
            },
            {
                topic: 'Strings',
                summary: 'A sequence of characters, used to represent text.',
                questions: [
                    'Reverse a string.',
                    'Find the first non-repeating character in a string.',
                    'Check if a string is a valid palindrome.'
                ],
                code: `// Example: Valid Anagram
function isAnagram(s, t) {
    if (s.length !== t.length) return false;
    const charCount = {};
    for (const char of s) {
        charCount[char] = (charCount[char] || 0) + 1;
    }
    for (const char of t) {
        if (!charCount[char]) return false;
        charCount[char]--;
    }
    return true;
}`
            }
        ];

        const dsaContainer = document.getElementById('dsa-container');
        dsaData.forEach(item => {
            const topicDiv = document.createElement('div');
            topicDiv.className = 'dsa-topic';

            const heading = document.createElement('h3');
            heading.textContent = item.topic;
            topicDiv.appendChild(heading);

            const summary = document.createElement('p');
            summary.textContent = item.summary;
            topicDiv.appendChild(summary);

            const questionsHeading = document.createElement('h4');
            questionsHeading.textContent = 'Common Questions:';
            topicDiv.appendChild(questionsHeading);

            const questionsList = document.createElement('ul');
            item.questions.forEach(q => {
                const li = document.createElement('li');
                li.textContent = q;
                questionsList.appendChild(li);
            });
            topicDiv.appendChild(questionsList);

            const codeBlock = document.createElement('pre');
            codeBlock.className = 'code-block';
            codeBlock.textContent = item.code;
            topicDiv.appendChild(codeBlock);

            dsaContainer.appendChild(topicDiv);
        });
    </script>
