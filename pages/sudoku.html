<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sudoku</title>
    <link rel="stylesheet" href="../style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        .sudoku-container { text-align: center; }
        .sudoku-grid {
            display: grid;
            grid-template-columns: repeat(9, 1fr);
            grid-template-rows: repeat(9, 1fr);
            width: 450px;
            height: 450px;
            margin: 2rem auto;
            border: 3px solid var(--md-sys-color-outline-light);
        }
        body.dark-theme .sudoku-grid {
            border: 3px solid var(--md-sys-color-outline-dark);
        }
        .sudoku-cell {
            width: 50px;
            height: 50px;
            border: 1px solid var(--md-sys-color-outline-light);
            text-align: center;
            font-size: 1.5rem;
            background-color: var(--md-sys-color-surface-light);
            color: var(--md-sys-color-on-surface-light);
        }
        body.dark-theme .sudoku-cell {
            border: 1px solid var(--md-sys-color-outline-dark);
            background-color: var(--md-sys-color-surface-dark);
            color: var(--md-sys-color-on-surface-dark);
        }
        .sudoku-cell:nth-child(3n) { border-right: 2px solid var(--md-sys-color-primary-light); }
        .sudoku-cell:nth-child(9n+1) { border-left: none; }
        .sudoku-row:nth-child(3n) .sudoku-cell { border-bottom: 2px solid var(--md-sys-color-primary-light); }

        .sudoku-cell.given {
            font-weight: bold;
            background-color: var(--md-sys-color-surface-variant-light);
        }
        body.dark-theme .sudoku-cell.given {
            background-color: var(--md-sys-color-surface-variant-dark);
        }
        .sudoku-controls { margin-top: 2rem; }
    </style>
</head>
<body>

    <nav class="navbar">
        <div class="container">
            <a href="../index.html" class="nav-logo">AKASH</a>
            <ul class="nav-menu">
                <li class="nav-item"><a href="../index.html#experience" class="nav-link">Experience</a></li>
                <li class="nav-item"><a href="../index.html#certifications" class="nav-link">Certifications</a></li>
                <li class="nav-item"><a href="../index.html#skills" class="nav-link">Skills</a></li>
                <li class="nav-item"><a href="../index.html#education" class="nav-link">Education</a></li>
                <li class="nav-item"><a href="interview_prep.html" class="nav-link">Interview Prep</a></li>
                <li class="nav-item"><a href="DSA.html" class="nav-link">DSA</a></li>
                <li class="nav-item"><a href="games.html" class="nav-link">Games</a></li>
            </ul>
            <button class="theme-toggle" id="theme-toggle">
                <i class="fas fa-moon"></i>
            </button>
        </div>
    </nav>

    <main class="container sudoku-container">
        <h2>Sudoku</h2>
        <div class="sudoku-grid" id="sudoku-grid"></div>
        <div class="sudoku-controls">
            <button id="check-solution" class="glass-button">Check Solution</button>
            <button id="new-game" class="glass-button">New Game</button>
        </div>
        <div id="game-result" class="result"></div>
    </main>

    <footer>
        <p>&copy; 2024 AKASH. All rights reserved.</p>
    </footer>

    <script src="../script.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const grid = document.getElementById('sudoku-grid');
            const newGameBtn = document.getElementById('new-game');
            const checkSolutionBtn = document.getElementById('check-solution');
            const gameResult = document.getElementById('game-result');

            let board = [];
            let solution = [];

            function generatePuzzle() {
                board = Array(9).fill(0).map(() => Array(9).fill(0));
                solution = Array(9).fill(0).map(() => Array(9).fill(0));

                solve(board);
                solution = JSON.parse(JSON.stringify(board));

                removeNumbers(board, 40);
                renderBoard();
            }

            function solve(board) {
                for (let r = 0; r < 9; r++) {
                    for (let c = 0; c < 9; c++) {
                        if (board[r][c] === 0) {
                            const nums = [1, 2, 3, 4, 5, 6, 7, 8, 9].sort(() => Math.random() - 0.5);
                            for (let num of nums) {
                                if (isValid(board, r, c, num)) {
                                    board[r][c] = num;
                                    if (solve(board)) {
                                        return true;
                                    }
                                    board[r][c] = 0;
                                }
                            }
                            return false;
                        }
                    }
                }
                return true;
            }

            function isValid(board, row, col, num) {
                for (let i = 0; i < 9; i++) {
                    if (board[row][i] === num || board[i][col] === num) {
                        return false;
                    }
                }
                const startRow = Math.floor(row / 3) * 3;
                const startCol = Math.floor(col / 3) * 3;
                for (let r = 0; r < 3; r++) {
                    for (let c = 0; c < 3; c++) {
                        if (board[startRow + r][startCol + c] === num) {
                            return false;
                        }
                    }
                }
                return true;
            }

            function removeNumbers(board, count) {
                while (count > 0) {
                    const r = Math.floor(Math.random() * 9);
                    const c = Math.floor(Math.random() * 9);
                    if (board[r][c] !== 0) {
                        board[r][c] = 0;
                        count--;
                    }
                }
            }

            function renderBoard() {
                grid.innerHTML = '';
                for (let r = 0; r < 9; r++) {
                    const rowDiv = document.createElement('div');
                    rowDiv.className = 'sudoku-row';
                    for (let c = 0; c < 9; c++) {
                        const cell = document.createElement('input');
                        cell.type = 'text';
                        cell.maxLength = 1;
                        cell.className = 'sudoku-cell';
                        cell.dataset.row = r;
                        cell.dataset.col = c;
                        if (board[r][c] !== 0) {
                            cell.value = board[r][c];
                            cell.classList.add('given');
                            cell.disabled = true;
                        }
                        cell.addEventListener('input', (e) => {
                            if (!/^[1-9]$/.test(e.target.value)) {
                                e.target.value = '';
                            }
                        });
                        rowDiv.appendChild(cell);
                    }
                    grid.appendChild(rowDiv);
                }
            }

            function checkSolution() {
                const cells = document.querySelectorAll('.sudoku-cell');
                let userBoard = Array(9).fill(0).map(() => Array(9).fill(0));
                let isComplete = true;

                cells.forEach(cell => {
                    const r = cell.dataset.row;
                    const c = cell.dataset.col;
                    const val = cell.value === '' ? 0 : parseInt(cell.value);
                    userBoard[r][c] = val;
                    if(val === 0) isComplete = false;
                });

                if(!isComplete) {
                    gameResult.textContent = "Please fill all cells.";
                    return;
                }

                for (let r = 0; r < 9; r++) {
                    for (let c = 0; c < 9; c++) {
                        if (userBoard[r][c] !== solution[r][c]) {
                            gameResult.textContent = "Incorrect solution. Keep trying!";
                            return;
                        }
                    }
                }

                gameResult.textContent = "Congratulations! You solved it!";
            }

            newGameBtn.addEventListener('click', generatePuzzle);
            checkSolutionBtn.addEventListener('click', checkSolution);

            generatePuzzle();
        });
    </script>
</body>
</html>
